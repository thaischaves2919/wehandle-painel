<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>wehandle — Painel do Membro</title>
  <script>if(localStorage.getItem('wehandle_tema')==='dark')document.documentElement.classList.add('dark');</script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f6fa; color: #1e2b4a; min-height: 100vh; }

    /* ── Login ── */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { background: #fff; border-radius: 18px; padding: 40px 36px; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(26,35,64,0.12); text-align: center; }
    .login-logo { font-size: 22px; font-weight: 800; color: #1a2340; letter-spacing: -0.5px; margin-bottom: 6px; }
    .login-sub { font-size: 13px; color: #a0aec0; margin-bottom: 28px; }
    .login-avatar { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; color: #fff; margin: 0 auto 16px; }
    .login-nome { font-size: 17px; font-weight: 700; color: #1a2340; margin-bottom: 4px; }
    .login-hint { font-size: 12px; color: #718096; margin-bottom: 20px; }
    .pin-input { font-size: 28px; font-weight: 800; letter-spacing: 12px; text-align: center; border: 2px solid #e8eaf0; border-radius: 12px; padding: 14px 16px; width: 100%; outline: none; color: #1a2340; background: #f7f8fc; }
    .pin-input:focus { border-color: #1a2340; background: #fff; }
    .btn-entrar { background: #1a2340; color: #fff; border: none; border-radius: 10px; padding: 13px 0; width: 100%; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 16px; transition: background 0.15s; }
    .btn-entrar:hover { background: #e0296f; }
    .login-erro { color: #c53030; font-size: 13px; margin-top: 10px; display: none; }
    .login-token-erro { color: #c53030; font-size: 13px; padding: 40px; text-align: center; }
    .auth-form { text-align: left; margin-top: 4px; }
    .auth-group { margin-bottom: 14px; }
    .auth-label { display: block; font-size: 12px; font-weight: 600; color: #4a5568; margin-bottom: 5px; }
    .auth-input { width: 100%; padding: 11px 13px; border: 1.5px solid #e8eaf0; border-radius: 10px; font-size: 13px; color: #1a2340; outline: none; background: #f7f8fc; }
    .auth-input:focus { border-color: #1a2340; background: #fff; }
    .btn-sair { background: transparent; border: none; color: rgba(255,255,255,0.45); font-size: 12px; font-weight: 600; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: all 0.15s; margin-left: 4px; }
    .btn-sair:hover { color: #fff; background: rgba(255,255,255,0.1); }

    /* ── App ── */
    .app-wrap { display: none; }
    .topbar { background: #1a2340; padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; }
    .topbar-logo { font-size: 16px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    .topbar-user { display: flex; align-items: center; gap: 10px; }
    .topbar-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; }
    .topbar-nome { font-size: 13px; color: rgba(255,255,255,0.8); font-weight: 600; }
    .main { padding: 24px; max-width: 900px; margin: 0 auto; }

    /* ── Status badges ── */
    .status-badge   { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 700; white-space: nowrap; }
    .status-critico { background: #fff0f3; color: #c53030; border: 1px solid #feb2b2; }
    .status-ok      { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
    .status-atencao { background: #fffbeb; color: #b7791f; border: 1px solid #fbd38d; }

    /* ── Bônus ── */
    .bonus-card { background: #fff; border: 1px solid #e2e6ef; border-radius: 14px; padding: 18px 22px; margin-bottom: 22px; box-shadow: 0 2px 8px rgba(30,43,74,0.06); }
    .bonus-titulo { font-size: 14px; font-weight: 700; color: #1e2b4a; margin-bottom: 14px; }
    .bp-wrap   { background: #fff; border: 1px solid #e2e6ef; border-radius: 14px; padding: 18px 22px; margin-bottom: 22px; box-shadow: 0 2px 8px rgba(30,43,74,0.06); }
    .bp-titulo { font-size: 14px; font-weight: 700; color: #1e2b4a; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .bp-table  { width: 100%; border-collapse: collapse; font-size: 13px; border: 1px solid #e2e6ef; border-radius: 10px; overflow: hidden; }
    .bp-table th { text-align: left; padding: 9px 14px; font-size: 11px; font-weight: 600; color: #a0aec0; text-transform: uppercase; letter-spacing: 0.5px; background: #f7f8fa; border-bottom: 2px solid #e2e6ef; }
    .bp-table th:not(:first-child) { text-align: right; }
    .bp-table td { padding: 11px 14px; border-bottom: 1px solid #f7f8fa; vertical-align: middle; }
    .bp-td-nome   { font-weight: 600; color: #1e2b4a; }
    .bp-td-faixas { font-size: 11px; color: #a0aec0; margin-top: 3px; }
    .bp-td-faixas span { display: inline-flex; align-items: center; gap: 4px; margin-right: 10px; }
    .bp-td-faixas .ok { color: #276749; font-weight: 700; }
    .bp-td-val { text-align: right; font-weight: 700; color: #1e2b4a; }
    .bp-td-val.aguardando { color: #a0aec0; font-weight: 400; font-size: 12px; }
    .bp-td-val.andamento  { color: #2b6cb0; font-weight: 600; font-size: 12px; }
    .bp-td-periodo { font-size: 10px; color: #a0aec0; font-weight: 400; margin-top: 2px; }
    .bp-total td { background: #1e2b4a; color: #fff; border-bottom: none; font-weight: 700; font-size: 14px; }
    .bp-total .bp-td-nome { color: #8896b3; font-size: 12px; letter-spacing: 0.5px; text-transform: uppercase; }
    .bp-total .bp-td-val  { color: #22c55e; font-size: 18px; }

    /* ── Compact client cards ── */
    .clients-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .compact-card { background: #fff; border: 1.5px solid #e8eaf0; border-radius: 14px; padding: 20px; box-shadow: 0 1px 4px rgba(26,35,64,0.05); cursor: pointer; transition: all 0.18s; }
    .compact-card:hover { box-shadow: 0 6px 20px rgba(26,35,64,0.10); transform: translateY(-2px); border-color: #94a3b8; }
    .compact-card.encerrado { opacity: 0.6; filter: grayscale(30%); }
    .compact-card.encerrado:hover { opacity: 0.9; filter: grayscale(0%); }
    .cc-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; gap: 8px; }
    .cc-name { font-size: 15px; font-weight: 700; color: #1a2340; }
    .tipo-flag { display: inline-flex; align-items: center; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 99px; margin-left: 7px; vertical-align: middle; }
    .tipo-cliente { background: #e8edf5; color: #4a6fa5; border: 1px solid #c5d0e6; }
    .tipo-poc     { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
    .cc-cnpj { font-size: 10px; color: #a0aec0; font-family: monospace; margin-top: 2px; }
    .cc-badges { display: flex; gap: 4px; flex-wrap: wrap; flex-shrink: 0; }
    .cc-metrics { display: flex; gap: 8px; margin-bottom: 12px; }
    .cc-metric { flex: 1; background: #f7f8fc; border-radius: 9px; padding: 10px 8px; text-align: center; }
    .cc-metric-label { font-size: 10px; color: #a0aec0; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
    .cc-metric-value { font-size: 22px; font-weight: 800; color: #1a2340; line-height: 1; }
    .cc-metric-value.ok { color: #276749; }
    .cc-metric-sub { font-size: 10px; color: #a0aec0; margin-top: 3px; }
    .cc-prog { margin-bottom: 7px; }
    .cc-prog-label { display: flex; justify-content: space-between; font-size: 10px; color: #a0aec0; margin-bottom: 3px; }
    .cc-prog-bar { height: 5px; background: #edf2f7; border-radius: 99px; overflow: hidden; }
    .cc-prog-fill { height: 100%; border-radius: 99px; }
    .cc-fill-green  { background: #48bb78; }
    .cc-fill-orange { background: #ed8936; }
    .cc-fill-pink   { background: #64748b; }
    .cc-deadline { font-size: 11px; color: #718096; margin: 10px 0 12px; padding: 7px 10px; background: #f7f8fc; border-radius: 7px; }
    .cc-deadline.urgente { background: #fff0f3; color: #c53030; }
    .cc-deadline strong { font-weight: 700; }
    .cc-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 1px solid #f0f2f7; }
    .cc-fornecedores { font-size: 11px; color: #a0aec0; }
    .btn-ver-forn { background: #1a2340; color: #fff; border: none; padding: 6px 14px; border-radius: 8px; font-size: 11px; font-weight: 600; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
    .btn-ver-forn:hover { background: #2d3f65; }
    /* ── Encerrados / Navegação ── */
    .secao-titulo { font-size: 12px; font-weight: 700; color: #718096; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 14px; margin-top: 8px; display: flex; align-items: center; gap: 10px; }
    .secao-titulo::before, .secao-titulo::after { content: ''; flex: 1; height: 1px; background: #e2e6ef; }
    .btn-colapsar { background: #f7f8fa; border: 1px solid #e2e6ef; color: #718096; padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; margin: 0 auto 16px; }
    .btn-colapsar:hover { background: #edf2f7; }
    .encerrado-wrap { display: none; }
    .encerrado-wrap.aberto { display: block; }
    .detalhe-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
    .btn-voltar { display: flex; align-items: center; gap: 6px; background: #fff; border: 1px solid #e8eaf0; color: #4a5568; padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-voltar:hover { background: #f7f8fc; color: #1a2340; }
    /* ── Cliente cards (detalhe) ── */
    .section-titulo { font-size: 13px; font-weight: 700; color: #718096; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 14px; margin-top: 4px; }
    .card { background: #fff; border: 1px solid #e2e6ef; border-radius: 16px; padding: 24px; box-shadow: 0 2px 8px rgba(30,43,74,0.06); margin-bottom: 20px; }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; gap: 12px; }
    .card-title  { font-size: 18px; font-weight: 700; color: #1e2b4a; }
    .metric-row  { display: flex; gap: 12px; margin-bottom: 16px; }
    .metric-box  { flex: 1; background: #f7f8fa; border: 1px solid #e2e6ef; border-radius: 10px; padding: 14px 12px; text-align: center; }
    .metric-label { font-size: 11px; color: #a0aec0; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .metric-value { font-size: 28px; font-weight: 800; color: #1e2b4a; line-height: 1; }
    .metric-value.ok     { color: #276749; }
    .metric-value.alerta { color: #c53030; }
    .metric-sub  { font-size: 11px; color: #a0aec0; margin-top: 4px; }
    .progress-section { margin-bottom: 12px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: #718096; margin-bottom: 5px; }
    .progress-bar   { height: 8px; background: #edf2f7; border-radius: 99px; overflow: hidden; }
    .progress-fill  { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
    .fill-green  { background: #48bb78; }
    .fill-orange { background: #ed8936; }
    .fill-pink   { background: #64748b; }
    .gap-box   { background: #f7f8fa; border: 1px solid #e2e6ef; border-radius: 10px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; }
    .gap-label { color: #718096; }
    .gap-value { font-weight: 700; color: #1e2b4a; }
    .gap-value.alerta { color: #c53030; }
    .gap-value.ok     { color: #276749; }
    .section-title { font-size: 11px; font-weight: 700; color: #a0aec0; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; margin-top: 18px; }
    .section-sub   { font-size: 10px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 0.8px; padding: 4px 10px; border-radius: 4px; margin-bottom: 6px; display: inline-block; }
    .sub-verde   { background: #276749; }
    .sub-laranja { background: #b7791f; }

    /* ── Fornecedores table ── */
    .table-wrap { max-height: 420px; overflow-y: auto; overflow-x: auto; border-radius: 8px; border: 1px solid #edf2f7; margin-bottom: 12px; }
    .fornecedor-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .fornecedor-table thead th { position: sticky; top: 0; background: #f7f8fa; z-index: 1; }
    .fornecedor-table th { text-align: left; color: #a0aec0; font-weight: 600; padding: 7px 10px; border-bottom: 1px solid #edf2f7; white-space: nowrap; }
    .fornecedor-table td { padding: 7px 10px; border-bottom: 1px solid #f7f8fa; color: #4a5568; vertical-align: middle; }
    .fornecedor-table tr:last-child td { border-bottom: none; }
    .forn-nome { font-weight: 600; color: #1a2340; }
    .badge-novo { display: inline-block; background: #e0296f; color: #fff; border-radius: 4px; padding: 1px 5px; font-size: 9px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; animation: pulse-novo 1.8s infinite; }
    @keyframes pulse-novo { 0%,100%{opacity:1} 50%{opacity:0.55} }
    .status-sel { font-size: 10px; font-weight: 700; border: 1px solid #e2e8f0; border-radius: 99px; padding: 2px 8px; cursor: pointer; background: #f7f8fa; color: #4a5568; outline: none; }
    .vidas-input { width: 52px; font-size: 11px; border: 1px solid #e2e8f0; border-radius: 6px; padding: 3px 6px; text-align: center; color: #1a2340; outline: none; }
    .vidas-input:focus { border-color: #1a2340; }
    .btn-wa { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; background: #ececec; border: 1px solid #d0d0d0; border-radius: 50%; text-decoration: none; transition: background 0.15s; }
    .btn-wa:hover { background: #d4d4d4; }
    .btn-wa svg { width: 15px; height: 15px; fill: #444; }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 24px; right: 24px; background: #1e2b4a; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; opacity: 0; transform: translateY(10px); transition: all 0.3s; pointer-events: none; z-index: 9999; }
    .toast.show { opacity: 1; transform: translateY(0); }

    .atualizado-badge { font-size: 11px; color: rgba(255,255,255,0.4); }

    /* ── Tema Escuro ── */
    .btn-tema { background: none; border: 1.5px solid rgba(255,255,255,0.2); border-radius: 8px; font-size: 15px; cursor: pointer; padding: 4px 7px; line-height: 1; transition: background 0.2s; }
    .btn-tema:hover { background: rgba(255,255,255,0.1); }
    html.dark body { background: #0f1420; color: #e2e8f0; }
    html.dark .topbar { background: #0d1526; }
    html.dark .login-box { background: #1a2340; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
    html.dark .login-logo { color: #e2e8f0; }
    html.dark .login-sub { color: #6a7f99; }
    html.dark .login-nome { color: #e2e8f0; }
    html.dark .login-hint { color: #6a7f99; }
    html.dark .pin-input { background: #0f1420; border-color: #252f4a; color: #e2e8f0; }
    html.dark .pin-input:focus { background: #141c30; border-color: #8896b0; }
    html.dark .auth-label { color: #8896b0; }
    html.dark .auth-input { background: #0f1420; border-color: #252f4a; color: #e2e8f0; }
    html.dark .auth-input:focus { background: #141c30; border-color: #8896b0; }
    html.dark .compact-card { background: #1a2340; border-color: #252f4a; box-shadow: none; }
    html.dark .compact-card:hover { border-color: #e0296f; }
    html.dark .cc-name { color: #e2e8f0; }
    html.dark .cc-cnpj { color: #6a7f99; }
    html.dark .cc-metric { background: #0f1420; }
    html.dark .cc-metric-label, html.dark .cc-metric-sub, html.dark .cc-prog-label { color: #6a7f99; }
    html.dark .cc-metric-value { color: #e2e8f0; }
    html.dark .cc-prog-bar { background: #252f4a; }
    html.dark .cc-deadline { background: #141c30; color: #8896b0; }
    html.dark .cc-footer { border-top-color: #252f4a; }
    html.dark .cc-fornecedores { color: #6a7f99; }
    html.dark .bp-wrap { background: #1a2340; border-color: #252f4a; }
    html.dark .bp-titulo { color: #e2e8f0; }
    html.dark .bp-table th { background: #141c30; color: #6a7f99; border-bottom-color: #252f4a; }
    html.dark .bp-table td { border-bottom-color: #1e2840; }
    html.dark .bp-td-nome { color: #e2e8f0; }
    html.dark .bonus-card { background: #1a2340; border-color: #252f4a; box-shadow: none; }
    html.dark .bonus-titulo { color: #e2e8f0; }
    html.dark .secao-titulo { color: #6a7f99; }
    html.dark .secao-titulo::before, html.dark .secao-titulo::after { background: #252f4a; }
    html.dark .btn-colapsar { background: #1a2340; border-color: #252f4a; color: #8896b0; }
    html.dark .toast { background: #252f4a; }
    html.dark .tipo-cliente { background: #1e3050; color: #90b8e0; border-color: #2a4a70; }
    html.dark .tipo-poc { background: #2a2010; color: #d4a040; border-color: #4a3a10; }

    /* ── Modal overlay (compartilhado) ── */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(10,20,50,0.45); z-index:1000; align-items:center; justify-content:center; padding:16px; }
    .modal-overlay.aberto { display:flex; }
    .modal-box-m { background:#fff; border-radius:18px; padding:28px; width:100%; max-width:620px; max-height:90vh; display:flex; flex-direction:column; box-shadow:0 8px 40px rgba(10,20,50,0.18); }
    .modal-titulo-m { font-size:16px; font-weight:800; color:#1a2340; }
    .btn-modal-cancelar-m { background:#f1f5f9; color:#475569; border:none; padding:8px 18px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; }

    /* ── Evolução ── */
    .evol-table { width:100%; border-collapse:collapse; font-size:13px; margin-top:12px; }
    .evol-table th { text-align:right; padding:8px 12px; font-size:11px; font-weight:600; color:#a0aec0; text-transform:uppercase; letter-spacing:0.5px; background:#f7f8fa; border-bottom:2px solid #e2e6ef; }
    .evol-table th:first-child { text-align:left; }
    .evol-table td { padding:10px 12px; border-bottom:1px solid #f0f2f7; text-align:right; color:#4a5568; }
    .evol-table td:first-child { text-align:left; font-weight:600; color:#1a2340; }
    .evol-table tr:last-child td { border-bottom:none; font-weight:700; background:#f7f8fa; }
    .evol-ok    { color:#276749 !important; font-weight:700 !important; }
    .evol-alerta{ color:#c53030 !important; }
    .btn-evolucao-m { background:#f0f4ff; color:#2b4acb; border:1px solid #c3cfe2; padding:6px 14px; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
    .btn-evolucao-m:hover { background:#e0e8ff; }
    .contato-input-m { display:block; width:100%; padding:4px 7px; border:1px solid #e2e6ef; border-radius:6px; font-size:11px; color:#1a2340; background:#f7f8fc; margin-bottom:3px; outline:none; }
    .contato-input-m:focus { border-color:#64748b; background:#fff; }
    .btn-exportar-csv-m { background:#276749; color:#fff; border:none; padding:8px 18px; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer; }
    .btn-exportar-csv-m:hover { background:#1e5338; }
  </style>
</head>
<body>

<!-- Tela de login -->
<div id="login-wrap" class="login-wrap">
  <div id="login-box" class="login-box">
    <div class="login-logo">wehandle</div>
    <div class="login-sub">Painel do Membro</div>
    <div id="login-corpo"></div>
  </div>
</div>

<!-- App principal -->
<div id="app-wrap" class="app-wrap">
  <div class="topbar">
    <div class="topbar-logo">wehandle</div>
    <div class="topbar-user">
      <div id="app-avatar" class="topbar-avatar"></div>
      <div id="app-nome" class="topbar-nome"></div>
      <span class="atualizado-badge" id="badge-atualizado"></span>
      <button class="btn-tema" id="btn-tema" onclick="toggleTema()" title="Claro / Escuro">🌙</button>
      <button class="btn-sair" onclick="sairMembro()">Sair</button>
    </div>
  </div>
  <div class="main" id="app-main"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
<script>
  const BASE_URL = 'https://thaischaves2919.github.io/wehandle-painel/';
  const DADOS_URL = BASE_URL + 'dados.js?_=';
  const OVERRIDES_URL = BASE_URL + 'overrides.js?_=';

  let _membro = null;
  let _equipe = null;
  let _dados = null;
  let _versaoDados = '';
  let _snapOverrides = null;
  let _contatosLocal = {};
  let _ovContacts = {};
  let _ovTipos    = {};

  function getToken() {
    const p = new URLSearchParams(location.search);
    return p.get('t') || '';
  }

  function mostrarToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function iniciais(nome) {
    return nome.split(' ').slice(0,2).map(p => p[0]).join('').toUpperCase();
  }

  function contatosKey(membroId) {
    return 'wh_m_' + membroId + '_contacts_v1';
  }

  function carregarContatos(membroId) {
    try {
      const r = localStorage.getItem(contatosKey(membroId));
      return r ? JSON.parse(r) : {};
    } catch(e) { return {}; }
  }

  function salvarContatos(membroId, dados) {
    try { localStorage.setItem(contatosKey(membroId), JSON.stringify(dados)); } catch(e) {}
  }

  function getFornStatus(cnpj) {
    return (_contatosLocal[cnpj] && _contatosLocal[cnpj].status) || null;
  }
  function getFornVidas(cnpj) {
    return (_contatosLocal[cnpj] && _contatosLocal[cnpj].vidas !== undefined) ? _contatosLocal[cnpj].vidas : null;
  }

  function setFornStatus(cnpj, status) {
    if (!_contatosLocal[cnpj]) _contatosLocal[cnpj] = {};
    _contatosLocal[cnpj].status = status;
    salvarContatos(_membro.id, _contatosLocal);
    mostrarToast('Status salvo');
  }

  function setFornVidas(cnpj, vidas) {
    if (!_contatosLocal[cnpj]) _contatosLocal[cnpj] = {};
    _contatosLocal[cnpj].vidas = parseInt(vidas) || 0;
    salvarContatos(_membro.id, _contatosLocal);
  }

  // ── Render ────────────────────────────────────────────────────────────────

  const WA_SVG = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.125.558 4.122 1.533 5.854L.057 23.943l6.262-1.641A11.944 11.944 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.007-1.374l-.36-.213-3.716.975.993-3.624-.234-.373A9.817 9.817 0 012.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z"/></svg>';

  function tipoFlag(clienteId) {
    const isPoc = (_ovTipos[clienteId] || 'cliente') === 'poc';
    return '<span class="tipo-flag ' + (isPoc ? 'tipo-poc' : 'tipo-cliente') + '">' + (isPoc ? 'POC' : 'Cliente') + '</span>';
  }

  function buildFornRow(f, hoje) {
    const statusAtual = getFornStatus(f.cnpj) || f.status || 'pendente';
    const vidasAtual  = getFornVidas(f.cnpj) !== null ? getFornVidas(f.cnpj) : (f.vidas || 0);
    const novoBadge   = f.dataEntrada && (Date.now() - new Date(f.dataEntrada + 'T12:00:00').getTime()) / 86400000 <= 7 ? ' <span class="badge-novo">NOVO</span>' : '';
    const ov      = _ovContacts[f.cnpj] || {};
    const telRaw  = ov.tel   || f.tel   || '';
    const emailRaw= ov.email || f.email || '';
    const telNum  = telRaw.replace(/\D/g,'');
    const isFixo  = telNum.length === 10 ? !['6','7','8','9'].includes(telNum[2]) : telNum.length === 11 ? telNum[2] !== '9' : false;
    const waBt    = (telNum && !isFixo) ? '<a class="btn-wa" href="https://wa.me/55' + telNum + '" target="_blank" rel="noopener">' + WA_SVG + '</a>' : '';
    const cor     = statusAtual === 'contatado' ? '#276749' : '#c53030';
    const cnpjEsc = f.cnpj.replace(/'/g, "\\'");
    const tr      = document.createElement('tr');
    tr.dataset.cnpj = f.cnpj;
    tr.innerHTML =
      '<td><span class="forn-nome">' + (f.razaoSocial || '') + novoBadge + '</span></td>' +
      '<td style="font-family:monospace;font-size:10px;color:#718096;white-space:nowrap">' + (f.cnpj || '') + '</td>' +
      '<td><select class="status-sel" style="color:' + cor + '" onchange="setFornStatus(\'' + cnpjEsc + '\',this.value);this.style.color=this.value===\'contatado\'?\'#276749\':\'#c53030\'">' +
        '<option value="contatado"' + (statusAtual==='contatado'?' selected':'') + '>Contatado</option>' +
        '<option value="pendente"'  + (statusAtual==='pendente' ?' selected':'') + '>Pendente</option>' +
        '<option value="aguardando"'+ (statusAtual==='aguardando'?' selected':'') + '>Aguardando</option>' +
      '</select></td>' +
      '<td>' +
        '<input class="contato-input-m tel-m" type="text" placeholder="Telefone" value="' + (telRaw || '') + '" oninput="setFornContato(\'' + cnpjEsc + '\',\'tel\',this.value)"/>' +
        '<input class="contato-input-m email-m" type="text" placeholder="E-mail" value="' + (emailRaw || '') + '" oninput="setFornContato(\'' + cnpjEsc + '\',\'email\',this.value)"/>' +
      '</td>' +
      '<td style="white-space:nowrap">' + waBt + '</td>';
    return tr;
  }

  function setFornContato(cnpj, campo, valor) {
    if (!_ovContacts[cnpj]) _ovContacts[cnpj] = {};
    _ovContacts[cnpj][campo] = valor;
    if (!_contatosLocal[cnpj]) _contatosLocal[cnpj] = {};
    _contatosLocal[cnpj][campo] = valor;
    salvarContatos(_membro.id, _contatosLocal);
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  const fmtBRL       = v => 'R$ ' + Math.round(v).toLocaleString('pt-BR');
  const calcPrazoDt  = dataInicio => { const d = new Date(dataInicio + 'T00:00:00'); d.setDate(d.getDate() + 45); return d; };
  const encerradoFn  = c => calcPrazoDt(c.dataInicio) < new Date();

  function _badgesCliente(c, f1Atingida) {
    const metaF1 = c.metaVidasF1 || null;
    const metaF2 = c.metaVidasF2 || null;
    const metaAd = c.metaAderencia || 50;
    const vidas  = c.vidas || 0;
    const ader   = c.aderencia || 0;
    // Se a F1 já foi atingida pelo responsável anterior, a meta do membro é a F2
    const metaAlvo = f1Atingida ? metaF2 : metaF1;
    const bVCls  = metaAlvo === null ? 'status-atencao' : vidas >= metaAlvo ? 'status-ok' : vidas >= metaAlvo*0.75 ? 'status-atencao' : 'status-critico';
    const bVTxt  = metaAlvo === null ? (f1Atingida ? 'Sem F2' : 'Sem meta') : vidas >= metaAlvo ? 'Vidas OK' : vidas >= metaAlvo*0.75 ? 'Atenção' : 'Crítico';
    const bACls  = ader >= metaAd ? 'status-ok' : ader >= metaAd-5 ? 'status-atencao' : 'status-critico';
    const bATxt  = ader >= metaAd ? 'Ader. OK' : 'Aderência';
    return { bVCls, bVTxt, bACls, bATxt };
  }

  function criarCardCompactoMembro(c, f1Atingida) {
    const metaF1 = c.metaVidasF1 || null;
    const metaF2 = c.metaVidasF2 || null;
    const metaAd = c.metaAderencia || 50;
    const vidas  = c.vidas || 0;
    const ader   = c.aderencia || 0;
    const fornAll = c.fornecedores || [];
    const novosCC = fornAll.filter(f => f.dataEntrada && (Date.now() - new Date(f.dataEntrada + 'T12:00:00').getTime()) / 86400000 <= 7).length;
    const adStr  = ader.toFixed(2).replace('.', ',');
    const pctAd  = Math.min(ader / metaAd * 100, 100);
    const metaAlvo = f1Atingida ? metaF2 : metaF1;
    const pctAlvo  = metaAlvo ? Math.min(vidas / metaAlvo * 100, 100) : 0;
    // Período do membro: começa quando o prazo original termina, sem fim
    const membroInicio = calcPrazoDt(c.dataInicio);
    const { bVCls, bVTxt, bACls, bATxt } = _badgesCliente(c, f1Atingida);
    const deadlineHtml = '<div class="cc-deadline">Desde ' + membroInicio.toLocaleDateString('pt-BR') + ' · sem prazo definido</div>';

    const div = document.createElement('div');
    div.className = 'compact-card';
    div.innerHTML =
      '<div class="cc-header">' +
        '<div>' +
          '<div class="cc-name">' + c.nome + tipoFlag(c.id) + '</div>' +
          (c.cnpj ? '<div class="cc-cnpj">' + c.cnpj + '</div>' : '') +
        '</div>' +
        '<div class="cc-badges">' +
          '<span class="status-badge ' + bVCls + '">' + bVTxt + '</span>' +
          '<span class="status-badge ' + bACls + '">' + bATxt + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="cc-metrics">' +
        '<div class="cc-metric"><div class="cc-metric-label">Vidas</div><div class="cc-metric-value' + (metaAlvo&&vidas>=metaAlvo?' ok':'') + '">' + vidas + '</div><div class="cc-metric-sub">' + (metaAlvo ? (f1Atingida?'meta F2: ':'meta: ') + metaAlvo : 'sem meta') + '</div></div>' +
        '<div class="cc-metric"><div class="cc-metric-label">Aderência</div><div class="cc-metric-value' + (ader>=metaAd?' ok':'') + '">' + adStr + '%</div><div class="cc-metric-sub">meta: ' + metaAd + '%</div></div>' +
      '</div>' +
      '<div class="cc-prog"><div class="cc-prog-label"><span>Aderência</span><span>' + adStr + '% / ' + metaAd + '%</span></div><div class="cc-prog-bar"><div class="cc-prog-fill ' + (pctAd>=100?'cc-fill-green':'cc-fill-orange') + '" style="width:' + pctAd + '%"></div></div></div>' +
      (metaAlvo ? '<div class="cc-prog"><div class="cc-prog-label"><span>' + (f1Atingida?'Faixa 2':'Faixa 1') + '</span><span>' + vidas + ' / ' + metaAlvo + '</span></div><div class="cc-prog-bar"><div class="cc-prog-fill cc-fill-pink" style="width:' + pctAlvo + '%"></div></div></div>' : '') +
      deadlineHtml +
      '<div class="cc-footer">' +
        '<span class="cc-fornecedores">' + fornAll.length + ' fornecedor' + (fornAll.length !== 1 ? 'es' : '') + (novosCC > 0 ? ' · <strong style="color:#e0296f">+' + novosCC + ' novo' + (novosCC > 1 ? 's' : '') + '</strong>' : '') + '</span>' +
        '<button class="btn-ver-forn" onclick="event.stopPropagation();abrirDetalheMembro(\'' + c.id + '\')">Ver fornecedores →</button>' +
      '</div>';
    div.addEventListener('click', () => abrirDetalheMembro(c.id));
    return div;
  }

  function criarCardDetalheMembro(c, f1Atingida) {
    const hoje = new Date().toISOString().slice(0,10);
    const metaF1 = c.metaVidasF1 || null;
    const metaF2 = c.metaVidasF2 || null;
    const metaAd = c.metaAderencia || 50;
    const vidas  = c.vidas || 0;
    const ader   = c.aderencia || 0;
    const pctAd  = Math.min(ader / metaAd * 100, 100);
    const gapAd  = metaAd - ader;
    const { bVCls, bVTxt, bACls, bATxt } = _badgesCliente(c, f1Atingida);
    // Período do membro: começa quando o prazo original termina, sem fim
    const membroInicio = calcPrazoDt(c.dataInicio);
    const fornAll    = c.fornecedores || [];
    const comVidas   = fornAll.filter(f => { const v = getFornVidas(f.cnpj); return v !== null ? v > 0 : (f.vidas||0) > 0; });
    const novos      = fornAll.filter(f => f.dataEntrada && (Date.now() - new Date(f.dataEntrada + 'T12:00:00').getTime()) / 86400000 <= 7);
    const novosSet   = new Set(novos.map(f => f.cnpj));
    const contatados = fornAll.filter(f => { const s = getFornStatus(f.cnpj) || f.status; return s === 'contatado' && !novosSet.has(f.cnpj); });
    const pendentes  = fornAll.filter(f => { const s = getFornStatus(f.cnpj) || f.status; return (s === 'pendente' || s === 'aguardando') && !novosSet.has(f.cnpj); });

    // Barras e gaps dependem da meta do membro (F2 se f1Atingida, senão F1 + F2)
    let barrasHTML = '';
    let gapsHTML   = '';
    if (f1Atingida) {
      // Membro começa da F2
      const pctF2 = metaF2 ? Math.min(vidas / metaF2 * 100, 100) : 0;
      const gapF2 = metaF2 !== null ? Math.max(metaF2 - vidas, 0) : null;
      barrasHTML =
        '<div class="progress-section"><div class="progress-label"><span>Aderência — Meta ' + metaAd + '%</span><span>' + ader.toFixed(1) + '%</span></div><div class="progress-bar"><div class="progress-fill ' + (pctAd>=100?'fill-green':'fill-orange') + '" style="width:' + pctAd + '%"></div></div></div>' +
        (metaF2 ? '<div class="progress-section"><div class="progress-label"><span>Faixa 2 — Meta ' + metaF2 + ' vidas</span><span>' + vidas + ' / ' + metaF2 + '</span></div><div class="progress-bar"><div class="progress-fill fill-pink" style="width:' + pctF2 + '%"></div></div></div>' : '');
      gapsHTML =
        '<div class="gap-box" style="background:#f0fff4;border-color:#9ae6b4"><span class="gap-label">Faixa 1 atingida antes da transferência</span><span class="gap-value ok">✓</span></div>' +
        (gapF2!==null ? '<div class="gap-box"><span class="gap-label">Gap para faixa 2 (' + metaF2 + ' vidas)</span><span class="gap-value ' + (gapF2===0?'ok':'alerta') + '">' + (gapF2===0?'✓ Faixa 2 atingida':gapF2+' vidas') + '</span></div>' : '') +
        '<div class="gap-box"><span class="gap-label">Gap de aderência para ' + metaAd + '%</span><span class="gap-value ' + (gapAd<=0?'ok':'alerta') + '">' + (gapAd<=0?'✓ Meta atingida':gapAd.toFixed(1)+' p.p.') + '</span></div>';
    } else {
      // Membro começa da F1
      const pctF1 = metaF1 ? Math.min(vidas / metaF1 * 100, 100) : 0;
      const pctF2 = metaF2 ? Math.min(vidas / metaF2 * 100, 100) : null;
      const gapF1 = metaF1 !== null ? Math.max(metaF1 - vidas, 0) : null;
      barrasHTML =
        '<div class="progress-section"><div class="progress-label"><span>Aderência — Meta ' + metaAd + '%</span><span>' + ader.toFixed(1) + '%</span></div><div class="progress-bar"><div class="progress-fill ' + (pctAd>=100?'fill-green':'fill-orange') + '" style="width:' + pctAd + '%"></div></div></div>' +
        (metaF1 ? '<div class="progress-section"><div class="progress-label"><span>Faixa 1 — Meta ' + metaF1 + ' vidas</span><span>' + vidas + ' / ' + metaF1 + '</span></div><div class="progress-bar"><div class="progress-fill fill-pink" style="width:' + pctF1 + '%"></div></div></div>' : '') +
        (pctF2!==null ? '<div class="progress-section"><div class="progress-label"><span>Faixa 2 — Meta ' + metaF2 + ' vidas</span><span>' + vidas + ' / ' + metaF2 + '</span></div><div class="progress-bar"><div class="progress-fill fill-pink" style="width:' + pctF2 + '%"></div></div></div>' : '');
      gapsHTML =
        (gapF1!==null ? '<div class="gap-box"><span class="gap-label">Gap para faixa 1 (' + metaF1 + ' vidas)</span><span class="gap-value ' + (gapF1===0?'ok':'alerta') + '">' + (gapF1===0?'✓ Faixa 1 atingida':gapF1+' vidas') + '</span></div>' : '') +
        (metaF2 ? '<div class="gap-box"><span class="gap-label">Gap para faixa 2 (' + metaF2 + ' vidas)</span><span class="gap-value alerta">' + Math.max(metaF2-vidas,0) + ' vidas</span></div>' : '') +
        '<div class="gap-box"><span class="gap-label">Gap de aderência para ' + metaAd + '%</span><span class="gap-value ' + (gapAd<=0?'ok':'alerta') + '">' + (gapAd<=0?'✓ Meta atingida':gapAd.toFixed(1)+' p.p.') + '</span></div>';
    }

    // Sub do metric box de vidas: mostra a meta relevante
    const metaAlvo = f1Atingida ? metaF2 : metaF1;
    const vidasOk  = metaAlvo !== null && vidas >= metaAlvo;
    const vidasSub = metaF1 ? 'F1: ' + metaF1 + (metaF2 ? ' · F2: ' + metaF2 : '') : '—';

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<div class="card-header">' +
        '<div>' +
          '<div class="card-title">' + c.nome + tipoFlag(c.id) + '</div>' +
          (c.cnpj ? '<div style="font-size:11px;color:#a0aec0;font-family:monospace;margin-top:2px">' + c.cnpj + '</div>' : '') +
        '</div>' +
        '<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:flex-start">' +
          '<span class="status-badge ' + bVCls + '">' + bVTxt + '</span>' +
          '<span class="status-badge ' + bACls + '">' + bATxt + '</span>' +
        '</div>' +
      '</div>' +
      '<div style="background:#f7f8fa;border:1px solid #e2e6ef;border-radius:10px;padding:10px 14px;font-size:12px;color:#718096;margin-bottom:16px">' +
        'Desde <strong style="color:#1e2b4a">' + membroInicio.toLocaleDateString('pt-BR') + '</strong> · sem prazo definido' +
      '</div>' +
      '<div class="metric-row">' +
        '<div class="metric-box"><div class="metric-label">Vidas</div><div class="metric-value' + (vidasOk?' ok':'') + '">' + vidas + '</div><div class="metric-sub">meta ' + vidasSub + '</div></div>' +
        '<div class="metric-box"><div class="metric-label">Aderência</div><div class="metric-value' + (ader>=metaAd?' ok':'') + '">' + ader.toFixed(1) + '%</div><div class="metric-sub">meta: ' + metaAd + '%</div></div>' +
        '<div class="metric-box"><div class="metric-label">Fornec. c/ vidas</div><div class="metric-value">' + comVidas.length + '</div><div class="metric-sub">de ' + fornAll.length + '</div></div>' +
      '</div>' +
      barrasHTML +
      gapsHTML +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:20px;margin-bottom:10px">' +
        '<div class="section-title" style="margin:0">Fornecedores ' + c.nome + ' <span style="color:#a0aec0;font-weight:400">(' + fornAll.length + ' total)</span></div>' +
        '<div style="display:flex;gap:6px">' +
          (c.historico && c.historico.length > 0 ? '<button class="btn-evolucao-m" onclick="abrirEvolucaoMembro(\'' + c.id + '\')">📈 Ver Evolução</button>' : '') +
          '<button onclick="enviarEmailMassaMembro(\'' + c.id + '\')" style="background:#2b6cb0;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer">📧 E-mail em massa</button>' +
          '<button onclick="exportarPlanilhaMembro(\'' + c.id + '\')" style="background:#276749;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer">⬇ Planilha</button>' +
        '</div>' +
      '</div>' +
      (novos.length > 0 ?
        '<div class="section-sub" style="margin-top:0;background:#fff0f6;border:1px solid #fbb6ce;color:#c4146b;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700">🆕 Novos fornecedores (' + novos.length + ')</div>' +
        '<div class="table-wrap"><table class="fornecedor-table"><thead><tr><th>Razão Social</th><th>CNPJ</th><th>Status</th><th>Telefone / E-mail</th><th></th></tr></thead><tbody id="tn-' + c.id + '"></tbody></table></div>'
        : '') +
      '<div class="section-sub sub-verde" style="margin-top:' + (novos.length > 0 ? '12px' : '0') + '">✓ Já contatados (' + contatados.length + ')</div>' +
      '<div class="table-wrap"><table class="fornecedor-table"><thead><tr><th>Razão Social</th><th>CNPJ</th><th>Status</th><th>Telefone / E-mail</th><th></th></tr></thead><tbody id="tc-' + c.id + '"></tbody></table></div>' +
      (pendentes.length > 0 ?
        '<div class="section-sub sub-laranja" style="margin-top:12px">⏳ Pendentes / Aguardando (' + pendentes.length + ')</div>' +
        '<div class="table-wrap"><table class="fornecedor-table"><thead><tr><th>Razão Social</th><th>CNPJ</th><th>Status</th><th>Telefone / E-mail</th><th></th></tr></thead><tbody id="tp-' + c.id + '"></tbody></table></div>'
        : '');

    const tN = card.querySelector('#tn-' + c.id);
    const tC = card.querySelector('#tc-' + c.id);
    const tP = card.querySelector('#tp-' + c.id);
    novos.forEach(f      => tN && tN.appendChild(buildFornRow(f, hoje)));
    contatados.forEach(f => tC && tC.appendChild(buildFornRow(f, hoje)));
    pendentes.forEach(f  => tP && tP.appendChild(buildFornRow(f, hoje)));
    return card;
  }

  function abrirDetalheMembro(clienteId) {
    if (!_dados || !_equipe) return;
    const c = (_dados.clientes || []).find(x => x.id === clienteId);
    if (!c) return;
    const viewCards = document.getElementById('view-cards-membro');
    const viewDetalhe = document.getElementById('view-detalhe-membro');
    const detalheContent = document.getElementById('detalhe-content-membro');
    const detalheTitulo = document.getElementById('detalhe-titulo-membro');
    if (!viewCards || !viewDetalhe) return;
    const f1Atingida = !!(_equipe.responsaveis && _equipe.responsaveis[clienteId] && _equipe.responsaveis[clienteId].f1Atingida);
    viewCards.style.display = 'none';
    viewDetalhe.style.display = '';

  function renderApp() {
    if (!_membro || !_dados || !_equipe) return;

    const resp = _equipe.responsaveis || {};
    const clientesDoMembro = (_dados.clientes || []).filter(c =>
      c.dataInicio && resp[c.id] && resp[c.id].membroId === _membro.id
    );

    document.getElementById('app-avatar').style.background = _membro.cor || '#3b82f6';
    document.getElementById('app-avatar').textContent = iniciais(_membro.nome);
    document.getElementById('app-nome').textContent = _membro.nome;

    const main = document.getElementById('app-main');
    main.innerHTML = '';

    // ── View cards ──
    const viewCards = document.createElement('div');
    viewCards.id = 'view-cards-membro';

    // Bônus — 4% sobre a diferença entre MRR_F2 e MRR_F1
    let totalReceber = 0;
    const bpRows = clientesDoMembro.map(c => {
      const f1Atingida = !!(resp[c.id] && resp[c.id].f1Atingida);
      const membroInicioBonus = calcPrazoDt(c.dataInicio);
      const periodoStr = 'desde ' + membroInicioBonus.toLocaleDateString('pt-BR');
      const vidas  = c.vidasFinal != null ? c.vidasFinal : (c.vidas || 0);
      const metaF1 = c.metaVidasF1, metaF2 = c.metaVidasF2;
      const mrrF1  = c.mrrFaixa1 || null, mrrF2 = c.mrrFaixa2 || null;

      // Sem MRR definido
      if (!mrrF1 || !mrrF2) {
        return '<tr><td><div class="bp-td-nome">' + c.nome + '</div><div class="bp-td-periodo">' + periodoStr + '</div><div class="bp-td-faixas" style="color:#b7791f">Aguardando MRR das faixas</div></td><td class="bp-td-val aguardando">— a definir</td></tr>';
      }

      // Bônus = 4% da diferença MRR_F2 − MRR_F1
      const bonus = Math.round((mrrF2 - mrrF1) * 0.04);

      if (f1Atingida) {
        // F1 já foi atingida (pela responsável anterior) — meta do membro é F2
        const faltaF2 = metaF2 ? Math.max(metaF2 - vidas, 0) : null;
        const aReceber = (metaF2 && vidas >= metaF2) ? bonus : 0;
        totalReceber += aReceber;
        const anteriorTag = '<span style="color:#276749;font-weight:700">F1 ✓ (anterior)</span> ';
        const f2Tag = metaF2 ? '<span class="' + (faltaF2===0?'ok':'') + '">F2 ' + fmtBRL(bonus) + ' ' + (faltaF2===0?'✓':'(faltam '+faltaF2+'v)') + '</span>' : '<span style="color:#a0aec0">sem F2 definida</span>';
        const valCls = aReceber > 0 ? '' : 'andamento';
        const valTxt = aReceber > 0 ? fmtBRL(aReceber) : '⏳ Em andamento';
        return '<tr><td><div class="bp-td-nome">' + c.nome + '</div><div class="bp-td-periodo">' + periodoStr + '</div><div class="bp-td-faixas">' + anteriorTag + f2Tag + '</div></td><td class="bp-td-val ' + valCls + '">' + valTxt + '</td></tr>';
      } else {
        // Membro começa da F1 — bônus total ao bater F2
        const faltaF1 = metaF1 ? Math.max(metaF1 - vidas, 0) : null;
        const faltaF2 = metaF2 ? Math.max(metaF2 - vidas, 0) : null;
        const f1Ok = metaF1 && vidas >= metaF1;
        const f2Ok = metaF2 && vidas >= metaF2;
        const aReceber = f2Ok ? bonus : 0;
        totalReceber += aReceber;
        const f1Tag = metaF1 ? '<span class="' + (f1Ok?'ok':'') + '">F1 ' + (f1Ok?'✓':'(faltam '+faltaF1+'v)') + '</span> ' : '';
        const f2Tag = metaF2 ? '<span class="' + (f2Ok?'ok':'') + '">F2 ' + fmtBRL(bonus) + ' ' + (f2Ok?'✓':'(faltam '+(faltaF2||0)+'v)') + '</span>' : '';
        const valCls = aReceber > 0 ? '' : 'andamento';
        const valTxt = aReceber > 0 ? fmtBRL(aReceber) : (f1Ok ? '⏳ ' + fmtBRL(bonus) + ' ao bater F2' : '⏳ Em andamento');
        return '<tr><td><div class="bp-td-nome">' + c.nome + '</div><div class="bp-td-periodo">' + periodoStr + '</div><div class="bp-td-faixas">' + f1Tag + f2Tag + '</div></td><td class="bp-td-val ' + valCls + '">' + valTxt + '</td></tr>';
      }
    });
    const bonusDiv = document.createElement('div');
    bonusDiv.className = 'bp-wrap';
    bonusDiv.innerHTML =
      '<div class="bp-titulo">💰 Bônus desta rampagem</div>' +
      '<table class="bp-table"><thead><tr><th>Cliente</th><th>A receber</th></tr></thead>' +
      '<tbody>' + (bpRows.length ? bpRows.join('') : '<tr><td colspan="2" style="color:#a0aec0;text-align:center;padding:20px">Nenhum cliente atribuído ainda.</td></tr>') + '</tbody>' +
      '<tfoot><tr class="bp-total"><td class="bp-td-nome">Total</td><td class="bp-td-val">' + fmtBRL(totalReceber) + '</td></tr></tfoot></table>';
    viewCards.appendChild(bonusDiv);

    // Grid de cards (ativos vs encerrados)
    if (clientesDoMembro.length > 0) {
      const grid = document.createElement('div');
      grid.className = 'clients-grid';
      clientesDoMembro.forEach(c => {
        const f1A = !!(resp[c.id] && resp[c.id].f1Atingida);
        grid.appendChild(criarCardCompactoMembro(c, f1A));
      });
      viewCards.appendChild(grid);
    }

    if (clientesDoMembro.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'text-align:center;padding:48px;color:#a0aec0;font-size:14px';
      empty.textContent = 'Nenhum cliente atribuído a você ainda.';
      viewCards.appendChild(empty);
    }

    // ── View detalhe ──
    const viewDetalhe = document.createElement('div');
    viewDetalhe.id = 'view-detalhe-membro';
    viewDetalhe.style.display = 'none';
    viewDetalhe.innerHTML =
      '<div class="detalhe-nav">' +
        '<button class="btn-voltar" onclick="voltarCardsMembro()">← Voltar</button>' +
        '<span style="font-size:14px;font-weight:700;color:#1e2b4a" id="detalhe-titulo-membro"></span>' +
      '</div>' +
      '<div id="detalhe-content-membro"></div>';

    main.appendChild(viewCards);
    main.appendChild(viewDetalhe);
  }

  // ── Auto-refresh dados.js ─────────────────────────────────────────────────
  async function carregarDados() {
    try {
      const r = await fetch(DADOS_URL + Date.now());
      if (!r.ok) return;
      const txt = await r.text();
      const m = txt.match(/versao:\s*['"]([^'"]+)['"]/);
      if (!m || !m[1] || m[1] === _versaoDados) return false;
      _versaoDados = m[1];
      const s = document.createElement('script');
      s.textContent = txt;
      document.head.appendChild(s);
      document.head.removeChild(s);
      _dados = window.WEHANDLE_DADOS;
      return true;
    } catch(e) { return false; }
  }

  async function carregarOverrides() {
    try {
      const r = await fetch(OVERRIDES_URL + Date.now());
      if (!r.ok) return false;
      const txt = await r.text();
      if (txt === _snapOverrides) return false;
      _snapOverrides = txt;
      const s = document.createElement('script');
      s.textContent = txt;
      document.head.appendChild(s);
      document.head.removeChild(s);
      const ov = window.WEHANDLE_OVERRIDES || {};
      _equipe     = ov.equipe          || { membros: [], responsaveis: {} };
      _ovContacts = ov.contacts        || {};
      _ovTipos    = ov.tiposClientes   || {};
      return true;
    } catch(e) { return false; }
  }

  // ── Auth helpers ──────────────────────────────────────────────────────────
  async function _sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }
  function _mAuthKey(t)      { return 'wh_auth_m_' + t; }
  function _mSessKey(t)      { return 'wh_sess_m_' + t; }
  function _mSessKeyEmail(id){ return 'wh_sess_em_' + id; }

  function _mostrarTelaLoginEmail() {
    document.getElementById('login-box').innerHTML =
      '<div class="login-logo">wehandle</div>' +
      '<div class="login-hint">Entre com suas credenciais de acesso</div>' +
      '<form class="auth-form" onsubmit="event.preventDefault();_doEmailLogin()">' +
        '<div class="auth-group"><label class="auth-label">E-mail</label>' +
        '<input class="auth-input" id="m-email-login" type="email" autocomplete="username" autofocus placeholder="seu@email.com" /></div>' +
        '<div class="auth-group"><label class="auth-label">Senha</label>' +
        '<input class="auth-input" id="m-pass-login" type="password" autocomplete="current-password" placeholder="••••••••" /></div>' +
        '<div class="login-erro" id="login-erro">E-mail ou senha incorretos.</div>' +
        '<button class="btn-entrar" type="submit">Entrar</button>' +
      '</form>';
  }

  async function _doEmailLogin() {
    const email = ((document.getElementById('m-email-login') || {}).value || '').trim().toLowerCase();
    const pass  = ((document.getElementById('m-pass-login')  || {}).value || '');
    if (!email || !pass) return;
    const hash = await _sha256(pass);
    const membro = (_equipe.membros || []).find(m => (m.email || '').toLowerCase() === email && m.senha === hash);
    if (!membro) {
      const el = document.getElementById('login-erro');
      if (el) el.style.display = 'block';
      return;
    }
    sessionStorage.setItem(_mSessKeyEmail(membro.id), '1');
    _entrarNoAppMembro(membro);
  }
  function _getMAuthCreds(t) {
    try { return JSON.parse(localStorage.getItem(_mAuthKey(t)) || 'null'); } catch(e) { return null; }
  }
  function _saveMAuthCreds(t, user, hash) {
    localStorage.setItem(_mAuthKey(t), JSON.stringify({ user, hash }));
  }

  function _mostrarTelaAuth(membro, token) {
    const cor = membro.cor || '#3b82f6';
    const creds = _getMAuthCreds(token);

      '<div class="login-avatar" style="background:' + cor + '">' + iniciais(membro.nome) + '</div>' +
      '<div class="login-nome">' + membro.nome + '</div>';
    if (creds) {
      document.getElementById('login-box').innerHTML = header +
        '<div class="login-hint">Olá, ' + creds.user + '! Digite sua senha.</div>' +
        '<form class="auth-form" onsubmit="event.preventDefault();_doMembroLogin()">' +
        '<div class="auth-group"><label class="auth-label">Senha</label>' +
        '<input class="auth-input" id="m-pass" type="password" autocomplete="current-password" autofocus /></div>' +
        '<div class="login-erro" id="login-erro">Senha incorreta.</div>' +
        '<button class="btn-entrar" type="submit">Entrar</button>' +
        '</form>';
    } else {
      document.getElementById('login-box').innerHTML = header +
        '<div class="login-hint">Crie seu acesso para continuar</div>' +
        '<form class="auth-form" onsubmit="event.preventDefault();_doMembroCriar()">' +
        '<div class="auth-group"><label class="auth-label">Nome de usuário</label>' +
        '<input class="auth-input" id="m-user" type="text" autocomplete="username" placeholder="ex: joao.silva" autofocus /></div>' +
        '<div class="auth-group"><label class="auth-label">Senha</label>' +
        '<input class="auth-input" id="m-pass" type="password" autocomplete="new-password" /></div>' +
        '<div class="auth-group"><label class="auth-label">Confirmar senha</label>' +

  async function _doMembroLogin() {
    const membro = window._membroParaLogin;
    const token = getToken();
    const creds = _getMAuthCreds(token);
    const passEl = document.getElementById('m-pass');
    const erro = document.getElementById('login-erro');
    if (!passEl || !passEl.value) return;
    const h = await _sha256(passEl.value);
    if (h !== creds.hash) {
      erro.style.display = 'block';
      passEl.value = '';
      passEl.focus();
      return;
    }
    sessionStorage.setItem(_mSessKey(token), '1');
    _entrarNoAppMembro(membro);
  }

  async function _doMembroCriar() {
    const membro = window._membroParaLogin;
    const token = getToken();
    const user = ((document.getElementById('m-user') || {}).value || '').trim();
    const pass = (document.getElementById('m-pass') || {}).value || '';
    const conf = (document.getElementById('m-conf') || {}).value || '';
    const erro = document.getElementById('login-erro');
    erro.style.display = 'none';
    if (!user) { erro.textContent = 'Informe um nome de usuário.'; erro.style.display = 'block'; return; }
    if (pass.length < 6) { erro.textContent = 'Senha com mínimo 6 caracteres.'; erro.style.display = 'block'; return; }
    if (pass !== conf) { erro.textContent = 'As senhas não coincidem.'; erro.style.display = 'block'; return; }
    const h = await _sha256(pass);
    _saveMAuthCreds(token, user, h);
    sessionStorage.setItem(_mSessKey(token), '1');
    _entrarNoAppMembro(membro);
  }

  function _entrarNoAppMembro(membro) {
    _membro = membro;
    _contatosLocal = carregarContatos(membro.id);
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('app-wrap').style.display = 'block';
    renderApp();
    iniciarPolls();
  }

  function sairMembro() {
    const token = getToken();
    if (token) {
      sessionStorage.removeItem(_mSessKey(token));
    } else if (_membro) {
      sessionStorage.removeItem(_mSessKeyEmail(_membro.id));
    }
    _membro = null;
    document.getElementById('app-wrap').style.display = 'none';
    document.getElementById('login-wrap').style.display = 'flex';
    if (token) {
      const membro = window._membroParaLogin;
      if (membro) _mostrarTelaAuth(membro, token);

      _mostrarTelaLoginEmail();
    }
  }

  // ── Email em massa ────────────────────────────────────────────────────────
  function enviarEmailMassaMembro(clienteId) {
    const c = (_dados && _dados.clientes || []).find(cl => cl.id === clienteId);
    if (!c) return;
    const pendentes = (c.fornecedores || []).filter(f => {
      const s = getFornStatus(f.cnpj) || f.status;
      return s === 'pendente' || s === 'aguardando';
    });
    const emails = pendentes.map(f => {
      const ov = _ovContacts[f.cnpj];
      return (ov && ov.email) ? ov.email : (f.email || '');
    }).filter(e => e && e.includes('@'));
    if (!emails.length) { mostrarToast('Nenhum e-mail cadastrado nos pendentes'); return; }
    const nome = _membro ? _membro.nome : 'wehandle';
    const assunto = encodeURIComponent('Cadastro de colaboradores na plataforma wehandle — ' + c.nome);
    const corpo = encodeURIComponent(
      'Olá, tudo bem?\n\n' +
      'Meu nome é ' + nome + '.\n\n' +
      'Estou entrando em contato para apoiar vocês neste início com a ' + c.nome + ', auxiliando no cadastro de colaboradores, aderência e conformidade da documentação e explicando o funcionamento da plataforma da melhor forma possível.\n\n' +
      'Em caso de dúvidas, pode responder este e-mail.\n\n' +
      'Att,\n' + nome
    );
    window.open('mailto:?bcc=' + emails.join(',') + '&subject=' + assunto + '&body=' + corpo);
    mostrarToast('✓ ' + emails.length + ' e-mail(s) aberto(s)');
  }

  // ── Exportar planilha ─────────────────────────────────────────────────────
  function exportarPlanilhaMembro(clienteId) {
    if (typeof XLSX === 'undefined') { mostrarToast('Aguarde o carregamento da página...'); return; }
    const c = (_dados && _dados.clientes || []).find(cl => cl.id === clienteId);
    if (!c) return;
    const todos = (c.fornecedores || []).map(f => {
      const ov = _ovContacts[f.cnpj] || {};
      return {
        razaoSocial: f.razaoSocial || '',
        cnpj:        f.cnpj || '',
        tel:         (ov.tel || f.tel || ''),
        email:       (ov.email || f.email || ''),
        via:         f.via || '',
        contrato:    f.contrato || '',
        status:      getFornStatus(f.cnpj) || ov.status || f.status || 'pendente',
        vidas:       getFornVidas(f.cnpj) !== null ? getFornVidas(f.cnpj) : (f.vidas || 0),
      };
    });
    const pendentes = todos.filter(f => f.status === 'pendente' || f.status === 'aguardando');
    if (!pendentes.length) { mostrarToast('Nenhum fornecedor pendente'); return; }
    const VIA = { whatsapp: 'WhatsApp', email: 'E-mail' };
    const dados = [
      ['Empresa', 'CNPJ', 'Telefone', 'E-mail', 'Via de Contato', 'Contrato', 'Vidas'],
      ...pendentes.map(f => [f.razaoSocial, f.cnpj, f.tel, f.email, VIA[f.via] || f.via, f.contrato, f.vidas])
    ];
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(dados);
    ws['!cols'] = [{wch:45},{wch:20},{wch:16},{wch:32},{wch:14},{wch:12},{wch:8}];
    XLSX.utils.book_append_sheet(wb, ws, 'Pendentes');
    const hoje = new Date().toLocaleDateString('pt-BR').replace(/\//g, '-');
    XLSX.writeFile(wb, 'Pendentes_' + c.nome + '_' + hoje + '.xlsx');
    mostrarToast('✓ Planilha baixada!');
  }

  // ── Inicialização ─────────────────────────────────────────────────────────
  let _initTentativas = 0;
  const _INIT_MAX = 15; // 15 × 8s ≈ 2 minutos

  async function init() {
    const token = getToken();

    // Na primeira tentativa, mostra "Carregando..."
    if (_initTentativas === 0) {
      document.getElementById('login-box').innerHTML = '<div class="login-logo">wehandle</div><div class="login-sub">Carregando...</div>';
    }

    try {
      const rD = await fetch(DADOS_URL + Date.now(), { cache: 'no-store' });
      if (rD.ok) {
        const txt = await rD.text();
        _versaoDados = (txt.match(/versao:\s*['"]([^'"]+)['"]/)||[])[1] || '';
        const s = document.createElement('script'); s.textContent = txt; document.head.appendChild(s); document.head.removeChild(s);
        _dados = window.WEHANDLE_DADOS;
      }

      const rO = await fetch(OVERRIDES_URL + Date.now(), { cache: 'no-store' });
      if (rO.ok) {
        const txt = await rO.text();
        _snapOverrides = txt;
        const s = document.createElement('script'); s.textContent = txt; document.head.appendChild(s); document.head.removeChild(s);
        const ov = window.WEHANDLE_OVERRIDES || {};
        _equipe = ov.equipe || { membros: [], responsaveis: {} };
        _ovContacts = ov.contacts || {};
      }
    } catch(e) {}

    if (!_equipe) {
      document.getElementById('login-box').innerHTML =
        '<div class="login-logo">wehandle</div>' +
        '<div style="color:#c53030;font-size:13px;margin-top:10px">Erro ao carregar dados.</div>' +
        '<button class="btn-entrar" onclick="_initTentativas=0;init()" style="margin-top:16px">Tentar novamente</button>';
      return;
    }

    // Sem token → fluxo de login por e-mail
    if (!token) {
      _initTentativas = 0;
      const sessaoAtiva = (_equipe.membros || []).find(m => sessionStorage.getItem(_mSessKeyEmail(m.id)) === '1');
      if (sessaoAtiva) { _entrarNoAppMembro(sessaoAtiva); return; }
      document.getElementById('login-wrap').style.display = 'flex';
      _mostrarTelaLoginEmail();
      return;
    }

    const membro = (_equipe.membros || []).find(m => m.token === token);
    if (!membro) {
      _initTentativas++;
      if (_initTentativas < _INIT_MAX) {
        // Ainda pode ser propagação do CDN — retry automático
        const tentando = _initTentativas;
        document.getElementById('login-box').innerHTML =
          '<div class="login-logo">wehandle</div>' +
          '<div class="login-sub" style="color:#b7791f">Aguardando publicação do link...</div>' +
          '<div style="font-size:12px;color:#a0aec0;margin-top:8px">Tentativa ' + tentando + ' de ' + _INIT_MAX + ' · próxima em 8s</div>' +
          '<div style="width:180px;height:4px;background:#edf2f7;border-radius:99px;margin:12px auto 0"><div style="height:100%;border-radius:99px;background:#e0296f;width:' + Math.round(tentando/_INIT_MAX*100) + '%"></div></div>';
        setTimeout(init, 8000);
      } else {
        _initTentativas = 0;
        document.getElementById('login-box').innerHTML =
          '<div class="login-logo">wehandle</div>' +
          '<div style="color:#c53030;font-size:13px;margin-top:10px;text-align:center">Token inválido ou expirado.<br>Solicite um novo link ao gestor.</div>' +
          '<button class="btn-entrar" onclick="_initTentativas=0;init()" style="margin-top:16px;background:#4a5568">Tentar novamente</button>';
      }
      return;
    }

    _initTentativas = 0;

    window._membroParaLogin = membro;

    // Verificar sessão ativa
    if (sessionStorage.getItem(_mSessKey(token)) === '1') {
      _entrarNoAppMembro(membro);
      return;
    }

    // Bypass de gestora — só funciona quando servido localmente (localhost / file://)
    const _bypassParams = new URLSearchParams(location.search);
    const _isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.protocol === 'file:';
    if (_bypassParams.get('bypass') === '1' && _isLocal) {
      _entrarNoAppMembro(membro);
      return;
    }

    // Mostrar tela de credenciais
    document.getElementById('login-wrap').style.display = 'flex';
    _mostrarTelaAuth(membro, token);
  }

  function iniciarPolls() {
    // Auto-refresh dados a cada 5s
    setInterval(async () => {
      const changed = await carregarDados();
      if (changed) {
        document.getElementById('badge-atualizado').textContent = 'Atualizado ' + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
        renderApp();
      }
    }, 5000);

    // Auto-refresh overrides a cada 5s (detecta adição/remoção de clientes imediatamente)
    setInterval(async () => {
      const changed = await carregarOverrides();
      if (changed) {
        renderApp();
      }
    }, 5000);
  }

  init();

  function toggleTema() {
    const dark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('wehandle_tema', dark ? 'dark' : 'light');
    const btn = document.getElementById('btn-tema');
    if (btn) btn.textContent = dark ? '☀️' : '🌙';
  }
  (function() {
    const btn = document.getElementById('btn-tema');
    if (btn && document.documentElement.classList.contains('dark')) btn.textContent = '☀️';
  })();
</script>

<!-- Modal evolução membro -->
<div class="modal-overlay" id="modal-evolucao-membro">
  <div class="modal-box-m">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <div class="modal-titulo-m" id="evolucao-titulo-membro">Evolução</div>
      <button onclick="fecharEvolucaoMembro()" style="background:none;border:none;font-size:20px;color:#a0aec0;cursor:pointer;line-height:1">×</button>
    </div>
    <div id="evolucao-corpo-membro" style="overflow-y:auto;flex:1;min-height:0;"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px">
      <button class="btn-exportar-csv-m" id="btn-exportar-csv-membro">⬇ Exportar CSV</button>
      <button class="btn-modal-cancelar-m" onclick="fecharEvolucaoMembro()">Fechar</button>
    </div>
  </div>
</div>
<script>
  function abrirEvolucaoMembro(clienteId) {
    const cliente = (_dados && _dados.clientes || []).find(c => c.id === clienteId);
    if (!cliente || !cliente.historico || cliente.historico.length === 0) return;
    const metaF1 = cliente.metaVidasF1 || null;
    const metaAd = cliente.metaAderencia || 50;
    const hist   = [...cliente.historico].reverse();
    document.getElementById('evolucao-titulo-membro').textContent = 'Evolução — ' + cliente.nome;
    const linhas = hist.map((h, i) => {
      const dt      = new Date(h.data + 'T12:00:00').toLocaleDateString('pt-BR');
      const gapV    = metaF1 !== null ? Math.max(metaF1 - h.vidas, 0) : null;
      const gapA    = (metaAd - h.aderencia).toFixed(1).replace('.', ',');
      const adStr   = h.aderencia.toFixed(h.aderencia % 1 === 0 ? 0 : 2).replace('.', ',');
      const gapVStr = gapV === null ? '—' : gapV === 0 ? '✓' : '+' + gapV + 'v';
      const gapACls = parseFloat(h.aderencia) >= metaAd ? 'evol-ok' : 'evol-alerta';
      const gapVCls = gapV === 0 ? 'evol-ok' : 'evol-alerta';
      const latest  = i === 0 ? ' style="background:#f0f9ff"' : '';
      return '<tr' + latest + '>' +
        '<td>' + dt + (i === 0 ? ' <span style="font-size:10px;background:#e0f0ff;color:#2b6cb0;border-radius:4px;padding:1px 5px;font-weight:700">atual</span>' : '') + '</td>' +
        '<td>' + h.vidas + '</td>' +
        '<td>' + adStr + '%</td>' +
        '<td class="' + gapVCls + '">' + gapVStr + '</td>' +
        '<td class="' + gapACls + '">' + (parseFloat(gapA) <= 0 ? '✓' : gapA + ' p.p.') + '</td>' +
        '</tr>';
    });
    document.getElementById('evolucao-corpo-membro').innerHTML =
      '<table class="evol-table"><thead><tr>' +
      '<th>Data</th><th>Vidas</th><th>Aderência</th>' +
      '<th>Gap F1' + (metaF1 ? ' (' + metaF1 + 'v)' : '') + '</th>' +
      '<th>Gap Ader. (' + metaAd + '%)</th>' +
      '</tr></thead><tbody>' + linhas.join('') + '</tbody></table>';
    document.getElementById('btn-exportar-csv-membro').onclick = function() {
      const linhasCSV = [['Data','Vidas','Aderencia (%)','Gap Vidas F1','Gap Aderencia (p.p.)']];
      [...cliente.historico].reverse().forEach(function(h) {
        const dt   = new Date(h.data + 'T12:00:00').toLocaleDateString('pt-BR');
        const gapV = metaF1 !== null ? Math.max(metaF1 - h.vidas, 0) : '';
        const gapA = (metaAd - h.aderencia).toFixed(2);
        linhasCSV.push([dt, h.vidas, h.aderencia.toFixed(2).replace('.', ','), gapV, gapA.replace('.', ',')]);
      });
      const csv  = linhasCSV.map(function(r) { return r.join(';'); }).join('\r\n');
      const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url;
      a.download = 'evolucao-' + cliente.nome.toLowerCase().replace(/\s+/g, '-') + '.csv';
      a.click();
      URL.revokeObjectURL(url);
    };
    document.getElementById('modal-evolucao-membro').classList.add('aberto');
  }
  function fecharEvolucaoMembro() {
    document.getElementById('modal-evolucao-membro').classList.remove('aberto');
  }
  document.getElementById('modal-evolucao-membro').addEventListener('click', function(e) {
    if (e.target === this) fecharEvolucaoMembro();
  });
</script>

</body>
