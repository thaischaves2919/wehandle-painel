<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>wehandle — Painel do Membro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f6fa; color: #1e2b4a; min-height: 100vh; }

    /* ── Login ── */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { background: #fff; border-radius: 18px; padding: 40px 36px; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(26,35,64,0.12); text-align: center; }
    .login-logo { font-size: 22px; font-weight: 800; color: #1a2340; letter-spacing: -0.5px; margin-bottom: 6px; }
    .login-sub { font-size: 13px; color: #a0aec0; margin-bottom: 28px; }
    .login-avatar { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; color: #fff; margin: 0 auto 16px; }
    .login-nome { font-size: 17px; font-weight: 700; color: #1a2340; margin-bottom: 4px; }
    .login-hint { font-size: 12px; color: #718096; margin-bottom: 20px; }
    .pin-input { font-size: 28px; font-weight: 800; letter-spacing: 12px; text-align: center; border: 2px solid #e8eaf0; border-radius: 12px; padding: 14px 16px; width: 100%; outline: none; color: #1a2340; background: #f7f8fc; }
    .pin-input:focus { border-color: #1a2340; background: #fff; }
    .btn-entrar { background: #1a2340; color: #fff; border: none; border-radius: 10px; padding: 13px 0; width: 100%; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 16px; transition: background 0.15s; }
    .btn-entrar:hover { background: #e0296f; }
    .login-erro { color: #c53030; font-size: 13px; margin-top: 10px; display: none; }
    .login-token-erro { color: #c53030; font-size: 13px; padding: 40px; text-align: center; }
    .auth-form { text-align: left; margin-top: 4px; }
    .auth-group { margin-bottom: 14px; }
    .auth-label { display: block; font-size: 12px; font-weight: 600; color: #4a5568; margin-bottom: 5px; }
    .auth-input { width: 100%; padding: 11px 13px; border: 1.5px solid #e8eaf0; border-radius: 10px; font-size: 13px; color: #1a2340; outline: none; background: #f7f8fc; }
    .auth-input:focus { border-color: #1a2340; background: #fff; }
    .btn-sair { background: transparent; border: none; color: rgba(255,255,255,0.45); font-size: 12px; font-weight: 600; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: all 0.15s; margin-left: 4px; }
    .btn-sair:hover { color: #fff; background: rgba(255,255,255,0.1); }

    /* ── App ── */
    .app-wrap { display: none; }
    .topbar { background: #1a2340; padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; }
    .topbar-logo { font-size: 16px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    .topbar-user { display: flex; align-items: center; gap: 10px; }
    .topbar-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; }
    .topbar-nome { font-size: 13px; color: rgba(255,255,255,0.8); font-weight: 600; }
    .main { padding: 24px; max-width: 900px; margin: 0 auto; }

    /* ── Status badges ── */
    .status-badge   { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 700; white-space: nowrap; }
    .status-critico { background: #fff0f3; color: #c53030; border: 1px solid #feb2b2; }
    .status-ok      { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
    .status-atencao { background: #fffbeb; color: #b7791f; border: 1px solid #fbd38d; }

    /* ── Bônus ── */
    .bonus-card { background: #fff; border: 1px solid #e2e6ef; border-radius: 14px; padding: 18px 22px; margin-bottom: 22px; box-shadow: 0 2px 8px rgba(30,43,74,0.06); }
    .bonus-titulo { font-size: 14px; font-weight: 700; color: #1e2b4a; margin-bottom: 14px; }

    /* ── Cliente cards ── */
    .section-titulo { font-size: 13px; font-weight: 700; color: #718096; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 14px; margin-top: 4px; }
    .card { background: #fff; border: 1px solid #e2e6ef; border-radius: 16px; padding: 24px; box-shadow: 0 2px 8px rgba(30,43,74,0.06); margin-bottom: 20px; }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; gap: 12px; }
    .card-title  { font-size: 18px; font-weight: 700; color: #1e2b4a; }
    .metric-row  { display: flex; gap: 12px; margin-bottom: 16px; }
    .metric-box  { flex: 1; background: #f7f8fa; border: 1px solid #e2e6ef; border-radius: 10px; padding: 14px 12px; text-align: center; }
    .metric-label { font-size: 11px; color: #a0aec0; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .metric-value { font-size: 28px; font-weight: 800; color: #1e2b4a; line-height: 1; }
    .metric-value.ok     { color: #276749; }
    .metric-value.alerta { color: #c53030; }
    .metric-sub  { font-size: 11px; color: #a0aec0; margin-top: 4px; }
    .progress-section { margin-bottom: 12px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: #718096; margin-bottom: 5px; }
    .progress-bar   { height: 8px; background: #edf2f7; border-radius: 99px; overflow: hidden; }
    .progress-fill  { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
    .fill-green  { background: linear-gradient(90deg, #38a169, #68d391); }
    .fill-orange { background: linear-gradient(90deg, #dd6b20, #f6ad55); }
    .fill-pink   { background: linear-gradient(90deg, #d4326d, #e8679a); }
    .gap-box   { background: #f7f8fa; border: 1px solid #e2e6ef; border-radius: 10px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; }
    .gap-label { color: #718096; }
    .gap-value { font-weight: 700; color: #1e2b4a; }
    .gap-value.alerta { color: #c53030; }
    .gap-value.ok     { color: #276749; }
    .section-title { font-size: 11px; font-weight: 700; color: #a0aec0; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; margin-top: 18px; }
    .section-sub   { font-size: 10px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 0.8px; padding: 4px 10px; border-radius: 4px; margin-bottom: 6px; display: inline-block; }
    .sub-verde   { background: #276749; }
    .sub-laranja { background: #b7791f; }

    /* ── Fornecedores table ── */
    .table-wrap { max-height: 420px; overflow-y: auto; overflow-x: auto; border-radius: 8px; border: 1px solid #edf2f7; margin-bottom: 12px; }
    .fornecedor-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .fornecedor-table thead th { position: sticky; top: 0; background: #f7f8fa; z-index: 1; }
    .fornecedor-table th { text-align: left; color: #a0aec0; font-weight: 600; padding: 7px 10px; border-bottom: 1px solid #edf2f7; white-space: nowrap; }
    .fornecedor-table td { padding: 7px 10px; border-bottom: 1px solid #f7f8fa; color: #4a5568; vertical-align: middle; }
    .fornecedor-table tr:last-child td { border-bottom: none; }
    .forn-nome { font-weight: 600; color: #1a2340; }
    .badge-novo { display: inline-block; background: #e0296f; color: #fff; border-radius: 4px; padding: 1px 5px; font-size: 9px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; animation: pulse-novo 1.8s infinite; }
    @keyframes pulse-novo { 0%,100%{opacity:1} 50%{opacity:0.55} }
    .status-sel { font-size: 10px; font-weight: 700; border: 1px solid #e2e8f0; border-radius: 99px; padding: 2px 8px; cursor: pointer; background: #f7f8fa; color: #4a5568; outline: none; }
    .vidas-input { width: 52px; font-size: 11px; border: 1px solid #e2e8f0; border-radius: 6px; padding: 3px 6px; text-align: center; color: #1a2340; outline: none; }
    .vidas-input:focus { border-color: #1a2340; }
    .btn-wa { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; background: #25d366; border-radius: 50%; text-decoration: none; transition: background 0.15s; }
    .btn-wa:hover { background: #1da851; }
    .btn-wa svg { width: 15px; height: 15px; fill: #fff; }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 24px; right: 24px; background: #1e2b4a; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; opacity: 0; transform: translateY(10px); transition: all 0.3s; pointer-events: none; z-index: 9999; }
    .toast.show { opacity: 1; transform: translateY(0); }

    .atualizado-badge { font-size: 11px; color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>

<!-- Tela de login -->
<div id="login-wrap" class="login-wrap">
  <div id="login-box" class="login-box">
    <div class="login-logo">wehandle</div>
    <div class="login-sub">Painel do Membro</div>
    <div id="login-corpo"></div>
  </div>
</div>

<!-- App principal -->
<div id="app-wrap" class="app-wrap">
  <div class="topbar">
    <div class="topbar-logo">wehandle</div>
    <div class="topbar-user">
      <div id="app-avatar" class="topbar-avatar"></div>
      <div id="app-nome" class="topbar-nome"></div>
      <span class="atualizado-badge" id="badge-atualizado"></span>
      <button class="btn-sair" onclick="sairMembro()">Sair</button>
    </div>
  </div>
  <div class="main" id="app-main"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
<script>
  const BASE_URL = 'https://thaischaves2919.github.io/wehandle-painel/';
  const DADOS_URL = BASE_URL + 'dados.js?_=';
  const OVERRIDES_URL = BASE_URL + 'overrides.js?_=';

  let _membro = null;
  let _equipe = null;
  let _dados = null;
  let _versaoDados = '';
  let _snapOverrides = null;
  let _contatosLocal = {};
  let _ovContacts = {};

  function getToken() {
    const p = new URLSearchParams(location.search);
    return p.get('t') || '';
  }

  function mostrarToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function iniciais(nome) {
    return nome.split(' ').slice(0,2).map(p => p[0]).join('').toUpperCase();
  }

  function contatosKey(membroId) {
    return 'wh_m_' + membroId + '_contacts_v1';
  }

  function carregarContatos(membroId) {
    try {
      const r = localStorage.getItem(contatosKey(membroId));
      return r ? JSON.parse(r) : {};
    } catch(e) { return {}; }
  }

  function salvarContatos(membroId, dados) {
    try { localStorage.setItem(contatosKey(membroId), JSON.stringify(dados)); } catch(e) {}
  }

  function getFornStatus(cnpj) {
    return (_contatosLocal[cnpj] && _contatosLocal[cnpj].status) || null;
  }
  function getFornVidas(cnpj) {
    return (_contatosLocal[cnpj] && _contatosLocal[cnpj].vidas !== undefined) ? _contatosLocal[cnpj].vidas : null;
  }

  function setFornStatus(cnpj, status) {
    if (!_contatosLocal[cnpj]) _contatosLocal[cnpj] = {};
    _contatosLocal[cnpj].status = status;
    salvarContatos(_membro.id, _contatosLocal);
    mostrarToast('Status salvo');
  }

  function setFornVidas(cnpj, vidas) {
    if (!_contatosLocal[cnpj]) _contatosLocal[cnpj] = {};
    _contatosLocal[cnpj].vidas = parseInt(vidas) || 0;
    salvarContatos(_membro.id, _contatosLocal);
  }

  // ── Render ────────────────────────────────────────────────────────────────

  const WA_SVG = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.125.558 4.122 1.533 5.854L.057 23.943l6.262-1.641A11.944 11.944 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.007-1.374l-.36-.213-3.716.975.993-3.624-.234-.373A9.817 9.817 0 012.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z"/></svg>';

  function buildFornRow(f, hoje) {
    const statusAtual = getFornStatus(f.cnpj) || f.status || 'pendente';
    const vidasAtual  = getFornVidas(f.cnpj) !== null ? getFornVidas(f.cnpj) : (f.vidas || 0);
    const novoBadge   = f.dataEntrada === hoje ? ' <span class="badge-novo">NOVO</span>' : '';
    const tel = (_ovContacts[f.cnpj] && _ovContacts[f.cnpj].tel) ? _ovContacts[f.cnpj].tel.replace(/\D/g,'') : '';
    const waBt = tel ? '<a class="btn-wa" href="https://wa.me/55' + tel + '" target="_blank" rel="noopener">' + WA_SVG + '</a>' : '';
    const cor  = statusAtual === 'contatado' ? '#276749' : '#c53030';
    const tr   = document.createElement('tr');
    tr.innerHTML =
      '<td><span class="forn-nome">' + (f.razaoSocial || '') + novoBadge + '</span></td>' +
      '<td style="font-family:monospace;font-size:10px;color:#718096;white-space:nowrap">' + (f.cnpj || '') + '</td>' +
      '<td><select class="status-sel" style="color:' + cor + '" onchange="setFornStatus(\'' + f.cnpj + '\',this.value);this.style.color=this.value===\'contatado\'?\'#276749\':\'#c53030\'">' +
        '<option value="contatado"' + (statusAtual==='contatado'?' selected':'') + '>Contatado</option>' +
        '<option value="pendente"'  + (statusAtual==='pendente' ?' selected':'') + '>Pendente</option>' +
        '<option value="aguardando"'+ (statusAtual==='aguardando'?' selected':'') + '>Aguardando</option>' +
      '</select></td>' +
      '<td><input class="vidas-input" type="number" min="0" value="' + vidasAtual + '" onchange="setFornVidas(\'' + f.cnpj + '\',this.value)"/></td>' +
      '<td>' + waBt + '</td>';
    return tr;
  }

  function renderApp() {
    if (!_membro || !_dados || !_equipe) return;

    const resp = _equipe.responsaveis || {};
    const hoje = new Date().toISOString().slice(0,10);

    const clientesDoMembro = (_dados.clientes || []).filter(c =>
      c.dataInicio && resp[c.id] && resp[c.id].membroId === _membro.id
    );

    document.getElementById('app-avatar').style.background = _membro.cor || '#3b82f6';
    document.getElementById('app-avatar').textContent = iniciais(_membro.nome);
    document.getElementById('app-nome').textContent = _membro.nome;

    const main = document.getElementById('app-main');
    main.innerHTML = '';

    // ── Bônus ──
    let bonusPotencial = 0, bonusDesbloqueado = 0;
    for (const c of clientesDoMembro) {
      const r = resp[c.id] || {};
      const mrr2 = c.mrrFaixa2 || 0;
      bonusPotencial += mrr2 * 0.04;
      if (r.f1Atingida) bonusDesbloqueado += mrr2 * 0.04;
    }
    const desbloqueado = bonusDesbloqueado > 0;
    const bonusDiv = document.createElement('div');
    bonusDiv.className = 'bonus-card';
    bonusDiv.innerHTML =
      '<div class="bonus-titulo">Bônus de Rampagem</div>' +
      '<div style="text-align:center;padding:12px 0 4px">' +
        '<div style="font-size:32px;font-weight:800;color:' + (desbloqueado?'#276749':'#1e2b4a') + ';letter-spacing:-1px">R$ ' + bonusPotencial.toLocaleString('pt-BR',{minimumFractionDigits:2}) + '</div>' +
        '<div style="font-size:12px;color:#a0aec0;margin-top:6px">' + (clientesDoMembro.length===0 ? 'Nenhum cliente atribuído ainda.' : desbloqueado ? 'Bônus liberado — Faixa 2 ativa' : 'Disponível ao atingir a Faixa 1') + '</div>' +
      '</div>';
    main.appendChild(bonusDiv);

    if (clientesDoMembro.length > 0) {
      const secTit = document.createElement('div');
      secTit.className = 'section-titulo';
      secTit.textContent = 'Seus Clientes (' + clientesDoMembro.length + ')';
      main.appendChild(secTit);
    }

    for (const c of clientesDoMembro) {
      try {
        const card = document.createElement('div');
        card.className = 'card';

        const metaF1 = c.metaVidasF1 || null;
        const metaF2 = c.metaVidasF2 || null;
        const metaAd = c.metaAderencia || 50;
        const vidas  = c.vidas || 0;
        const ader   = c.aderencia || 0;
        const pctAd  = Math.min(ader / metaAd * 100, 100);
        const pctF1  = metaF1 ? Math.min(vidas / metaF1 * 100, 100) : 0;
        const pctF2  = metaF2 ? Math.min(vidas / metaF2 * 100, 100) : null;
        const gapF1  = metaF1 !== null ? Math.max(metaF1 - vidas, 0) : null;
        const gapAd  = metaAd - ader;

        const badgeVidasCls = metaF1 === null ? 'status-atencao' : vidas >= metaF1 ? 'status-ok' : vidas >= metaF1*0.75 ? 'status-atencao' : 'status-critico';
        const badgeVidasTxt = metaF1 === null ? 'Sem meta'        : vidas >= metaF1 ? 'Vidas OK' : vidas >= metaF1*0.75 ? 'Vidas: Atenção' : 'Crítico';
        const badgeAderCls  = ader >= metaAd ? 'status-ok' : ader >= metaAd-5 ? 'status-atencao' : 'status-critico';
        const badgeAderTxt  = ader >= metaAd ? 'Aderência OK'    : ader >= metaAd-5 ? 'Aderência: Atenção' : 'Aderência: Crítico';

        const prazoDate = new Date(c.dataInicio + 'T00:00:00');
        prazoDate.setDate(prazoDate.getDate() + 45);
        const dias    = Math.ceil((prazoDate - new Date()) / 86400000);
        const urgente = dias <= 15;
        const prazoFmt = prazoDate.toLocaleDateString('pt-BR');
        const inicioFmt = new Date(c.dataInicio + 'T12:00:00').toLocaleDateString('pt-BR');

        const fornAll    = c.fornecedores || [];
        const comVidas   = fornAll.filter(f => { const v = getFornVidas(f.cnpj); return v !== null ? v > 0 : (f.vidas||0) > 0; });
        const contatados = fornAll.filter(f => { const s = getFornStatus(f.cnpj) || f.status; return s === 'contatado'; });
        const pendentes  = fornAll.filter(f => { const s = getFornStatus(f.cnpj) || f.status; return s === 'pendente' || s === 'aguardando'; });

        card.innerHTML =
          // ── Header ──
          '<div class="card-header">' +
            '<div>' +
              '<div class="card-title">' + c.nome + '</div>' +
              (c.cnpj ? '<div style="font-size:11px;color:#a0aec0;font-family:monospace;margin-top:2px">' + c.cnpj + '</div>' : '') +
            '</div>' +
            '<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:flex-start">' +
              '<span class="status-badge ' + badgeVidasCls + '">' + badgeVidasTxt + '</span>' +
              '<span class="status-badge ' + badgeAderCls  + '">' + badgeAderTxt  + '</span>' +
            '</div>' +
          '</div>' +
          // ── Prazo ──
          '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;background:' + (urgente?'#fff0f3':'#f7f8fa') + ';border:1px solid ' + (urgente?'#feb2b2':'#e2e6ef') + ';border-radius:10px;padding:10px 14px;font-size:12px;">' +
            '<span style="font-size:22px;font-weight:800;color:' + (urgente?'#c53030':'#1e2b4a') + '">' + Math.max(dias,0) + '</span>' +
            '<span style="color:' + (urgente?'#c53030':'#718096') + '">dias restantes · prazo <strong style="color:' + (urgente?'#c53030':'#1e2b4a') + '">' + prazoFmt + '</strong> · início ' + inicioFmt + '</span>' +
          '</div>' +
          // ── Métricas ──
          '<div class="metric-row">' +
            '<div class="metric-box"><div class="metric-label">Vidas</div><div class="metric-value' + (metaF1&&vidas>=metaF1?' ok':'') + '">' + vidas + '</div><div class="metric-sub">meta F1: ' + (metaF1||'—') + (metaF2?' · F2: '+metaF2:'') + '</div></div>' +
            '<div class="metric-box"><div class="metric-label">Aderência</div><div class="metric-value' + (ader>=metaAd?' ok':'') + '">' + ader.toFixed(1) + '%</div><div class="metric-sub">meta: ' + metaAd + '%</div></div>' +
            '<div class="metric-box"><div class="metric-label">Fornec. c/ vidas</div><div class="metric-value">' + comVidas.length + '</div><div class="metric-sub">de ' + fornAll.length + '</div></div>' +
          '</div>' +
          // ── Barras de progresso ──
          '<div class="progress-section"><div class="progress-label"><span>Aderência — Meta ' + metaAd + '%</span><span>' + ader.toFixed(1) + '%</span></div><div class="progress-bar"><div class="progress-fill ' + (pctAd>=100?'fill-green':'fill-orange') + '" style="width:' + pctAd + '%"></div></div></div>' +
          (metaF1 ? '<div class="progress-section"><div class="progress-label"><span>Faixa 1 — Meta ' + metaF1 + ' vidas</span><span>' + vidas + ' / ' + metaF1 + '</span></div><div class="progress-bar"><div class="progress-fill fill-pink" style="width:' + pctF1 + '%"></div></div></div>' : '') +
          (pctF2!==null ? '<div class="progress-section"><div class="progress-label"><span>Faixa 2 — Meta ' + metaF2 + ' vidas</span><span>' + vidas + ' / ' + metaF2 + '</span></div><div class="progress-bar"><div class="progress-fill fill-pink" style="width:' + pctF2 + '%"></div></div></div>' : '') +
          // ── Gap boxes ──
          (gapF1!==null ? '<div class="gap-box"><span class="gap-label">Gap para faixa 1 (' + metaF1 + ' vidas)</span><span class="gap-value ' + (gapF1===0?'ok':'alerta') + '">' + (gapF1===0?'✓ Faixa 1 atingida':gapF1+' vidas') + '</span></div>' : '') +
          (metaF2 ? '<div class="gap-box"><span class="gap-label">Gap para faixa 2 (' + metaF2 + ' vidas)</span><span class="gap-value alerta">' + Math.max(metaF2-vidas,0) + ' vidas</span></div>' : '') +
          '<div class="gap-box"><span class="gap-label">Gap de aderência para ' + metaAd + '%</span><span class="gap-value ' + (gapAd<=0?'ok':'alerta') + '">' + (gapAd<=0?'✓ Meta atingida':gapAd.toFixed(1)+' p.p.') + '</span></div>' +
          // ── Fornecedores header ──
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:20px;margin-bottom:10px">' +
            '<div class="section-title" style="margin:0">Fornecedores ' + c.nome + ' <span style="color:#a0aec0;font-weight:400">(' + fornAll.length + ' total)</span></div>' +
            '<div style="display:flex;gap:6px">' +
              '<button onclick="enviarEmailMassaMembro(\'' + c.id + '\')" style="background:#2b6cb0;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer">📧 E-mail</button>' +
              '<button onclick="exportarPlanilhaMembro(\'' + c.id + '\')" style="background:#276749;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer">⬇ Planilha</button>' +
            '</div>' +
          '</div>' +
          // ── Tabelas (preenchidas abaixo via DOM) ──
          '<div class="section-sub sub-verde">✓ Já contatados (' + contatados.length + ')</div>' +
          '<div class="table-wrap"><table class="fornecedor-table"><thead><tr><th>Razão Social</th><th>CNPJ</th><th>Status</th><th>Vidas</th><th></th></tr></thead><tbody id="tc-' + c.id + '"></tbody></table></div>' +
          (pendentes.length>0 ?
            '<div class="section-sub sub-laranja">⏳ Pendentes / Aguardando (' + pendentes.length + ')</div>' +
            '<div class="table-wrap"><table class="fornecedor-table"><thead><tr><th>Razão Social</th><th>CNPJ</th><th>Status</th><th>Vidas</th><th></th></tr></thead><tbody id="tp-' + c.id + '"></tbody></table></div>'
            : '');

        const tC = card.querySelector('#tc-' + c.id);
        const tP = card.querySelector('#tp-' + c.id);
        contatados.forEach(f => tC && tC.appendChild(buildFornRow(f, hoje)));
        pendentes.forEach(f  => tP && tP.appendChild(buildFornRow(f, hoje)));

        main.appendChild(card);
      } catch(e) { console.error('Erro ao renderizar cliente', c.id, e); }
    }

    if (clientesDoMembro.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'text-align:center;padding:48px;color:#a0aec0;font-size:14px';
      empty.textContent = 'Nenhum cliente atribuído a você ainda.';
      main.appendChild(empty);
    }
  }

  // ── Auto-refresh dados.js ─────────────────────────────────────────────────
  async function carregarDados() {
    try {
      const r = await fetch(DADOS_URL + Date.now());
      if (!r.ok) return;
      const txt = await r.text();
      const m = txt.match(/versao:\s*['"]([^'"]+)['"]/);
      if (!m || !m[1] || m[1] === _versaoDados) return false;
      _versaoDados = m[1];
      const s = document.createElement('script');
      s.textContent = txt;
      document.head.appendChild(s);
      document.head.removeChild(s);
      _dados = window.WEHANDLE_DADOS;
      return true;
    } catch(e) { return false; }
  }

  async function carregarOverrides() {
    try {
      const r = await fetch(OVERRIDES_URL + Date.now());
      if (!r.ok) return false;
      const txt = await r.text();
      if (txt === _snapOverrides) return false;
      _snapOverrides = txt;
      const s = document.createElement('script');
      s.textContent = txt;
      document.head.appendChild(s);
      document.head.removeChild(s);
      const ov = window.WEHANDLE_OVERRIDES || {};
      _equipe = ov.equipe || { membros: [], responsaveis: {} };
      _ovContacts = ov.contacts || {};
      return true;
    } catch(e) { return false; }
  }

  // ── Auth helpers ──────────────────────────────────────────────────────────
  async function _sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }
  function _mAuthKey(t) { return 'wh_auth_m_' + t; }
  function _mSessKey(t) { return 'wh_sess_m_' + t; }
  function _getMAuthCreds(t) {
    try { return JSON.parse(localStorage.getItem(_mAuthKey(t)) || 'null'); } catch(e) { return null; }
  }
  function _saveMAuthCreds(t, user, hash) {
    localStorage.setItem(_mAuthKey(t), JSON.stringify({ user, hash }));
  }

  function _mostrarTelaAuth(membro, token) {
    const cor = membro.cor || '#3b82f6';
    const creds = _getMAuthCreds(token);
    const header =
      '<div class="login-logo">wehandle</div>' +
      '<div class="login-sub">Painel do Membro</div>' +
      '<div class="login-avatar" style="background:' + cor + '">' + iniciais(membro.nome) + '</div>' +
      '<div class="login-nome">' + membro.nome + '</div>';
    if (creds) {
      document.getElementById('login-box').innerHTML = header +
        '<div class="login-hint">Olá, ' + creds.user + '! Digite sua senha.</div>' +
        '<form class="auth-form" onsubmit="event.preventDefault();_doMembroLogin()">' +
        '<div class="auth-group"><label class="auth-label">Senha</label>' +
        '<input class="auth-input" id="m-pass" type="password" autocomplete="current-password" autofocus /></div>' +
        '<div class="login-erro" id="login-erro">Senha incorreta.</div>' +
        '<button class="btn-entrar" type="submit">Entrar</button>' +
        '</form>';
    } else {
      document.getElementById('login-box').innerHTML = header +
        '<div class="login-hint">Crie seu acesso para continuar</div>' +
        '<form class="auth-form" onsubmit="event.preventDefault();_doMembroCriar()">' +
        '<div class="auth-group"><label class="auth-label">Nome de usuário</label>' +
        '<input class="auth-input" id="m-user" type="text" autocomplete="username" placeholder="ex: joao.silva" autofocus /></div>' +
        '<div class="auth-group"><label class="auth-label">Senha</label>' +
        '<input class="auth-input" id="m-pass" type="password" autocomplete="new-password" /></div>' +
        '<div class="auth-group"><label class="auth-label">Confirmar senha</label>' +
        '<input class="auth-input" id="m-conf" type="password" autocomplete="new-password" /></div>' +
        '<div class="login-erro" id="login-erro"></div>' +
        '<button class="btn-entrar" type="submit">Criar acesso</button>' +
        '</form>';
    }
  }

  async function _doMembroLogin() {
    const membro = window._membroParaLogin;
    const token = getToken();
    const creds = _getMAuthCreds(token);
    const passEl = document.getElementById('m-pass');
    const erro = document.getElementById('login-erro');
    if (!passEl || !passEl.value) return;
    const h = await _sha256(passEl.value);
    if (h !== creds.hash) {
      erro.style.display = 'block';
      passEl.value = '';
      passEl.focus();
      return;
    }
    sessionStorage.setItem(_mSessKey(token), '1');
    _entrarNoAppMembro(membro);
  }

  async function _doMembroCriar() {
    const membro = window._membroParaLogin;
    const token = getToken();
    const user = ((document.getElementById('m-user') || {}).value || '').trim();
    const pass = (document.getElementById('m-pass') || {}).value || '';
    const conf = (document.getElementById('m-conf') || {}).value || '';
    const erro = document.getElementById('login-erro');
    erro.style.display = 'none';
    if (!user) { erro.textContent = 'Informe um nome de usuário.'; erro.style.display = 'block'; return; }
    if (pass.length < 6) { erro.textContent = 'Senha com mínimo 6 caracteres.'; erro.style.display = 'block'; return; }
    if (pass !== conf) { erro.textContent = 'As senhas não coincidem.'; erro.style.display = 'block'; return; }
    const h = await _sha256(pass);
    _saveMAuthCreds(token, user, h);
    sessionStorage.setItem(_mSessKey(token), '1');
    _entrarNoAppMembro(membro);
  }

  function _entrarNoAppMembro(membro) {
    _membro = membro;
    _contatosLocal = carregarContatos(membro.id);
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('app-wrap').style.display = 'block';
    renderApp();
    iniciarPolls();
  }

  function sairMembro() {
    const token = getToken();
    sessionStorage.removeItem(_mSessKey(token));
    _membro = null;
    document.getElementById('app-wrap').style.display = 'none';
    document.getElementById('login-wrap').style.display = 'flex';
    const membro = window._membroParaLogin;
    if (membro) _mostrarTelaAuth(membro, token);
  }

  // ── Email em massa ────────────────────────────────────────────────────────
  function enviarEmailMassaMembro(clienteId) {
    const c = (_dados && _dados.clientes || []).find(cl => cl.id === clienteId);
    if (!c) return;
    const pendentes = (c.fornecedores || []).filter(f => {
      const s = getFornStatus(f.cnpj) || f.status;
      return s === 'pendente' || s === 'aguardando';
    });
    const emails = pendentes.map(f => {
      const ov = _ovContacts[f.cnpj];
      return (ov && ov.email) ? ov.email : (f.email || '');
    }).filter(e => e && e.includes('@'));
    if (!emails.length) { mostrarToast('Nenhum e-mail cadastrado nos pendentes'); return; }
    const nome = _membro ? _membro.nome : 'wehandle';
    const assunto = encodeURIComponent('Cadastro de colaboradores na plataforma wehandle — ' + c.nome);
    const corpo = encodeURIComponent(
      'Olá, tudo bem?\n\n' +
      'Meu nome é ' + nome + ' e sou responsável pelo acompanhamento da implantação na plataforma wehandle.\n\n' +
      'Estou entrando em contato para apoiar vocês neste início com a ' + c.nome + ', auxiliando no cadastro de colaboradores, aderência e conformidade da documentação e explicando o funcionamento da plataforma da melhor forma possível.\n\n' +
      'Em caso de dúvidas, pode responder este e-mail.\n\n' +
      'Att,\n' + nome
    );
    window.open('mailto:?bcc=' + emails.join(',') + '&subject=' + assunto + '&body=' + corpo);
    mostrarToast('✓ ' + emails.length + ' e-mail(s) aberto(s)');
  }

  // ── Exportar planilha ─────────────────────────────────────────────────────
  function exportarPlanilhaMembro(clienteId) {
    if (typeof XLSX === 'undefined') { mostrarToast('Aguarde o carregamento da página...'); return; }
    const c = (_dados && _dados.clientes || []).find(cl => cl.id === clienteId);
    if (!c) return;
    const todos = (c.fornecedores || []).map(f => {
      const ov = _ovContacts[f.cnpj] || {};
      return {
        razaoSocial: f.razaoSocial || '',
        cnpj:        f.cnpj || '',
        tel:         (ov.tel || f.tel || ''),
        email:       (ov.email || f.email || ''),
        via:         f.via || '',
        contrato:    f.contrato || '',
        status:      getFornStatus(f.cnpj) || ov.status || f.status || 'pendente',
        vidas:       getFornVidas(f.cnpj) !== null ? getFornVidas(f.cnpj) : (f.vidas || 0),
      };
    });
    const pendentes = todos.filter(f => f.status === 'pendente' || f.status === 'aguardando');
    if (!pendentes.length) { mostrarToast('Nenhum fornecedor pendente'); return; }
    const VIA = { whatsapp: 'WhatsApp', email: 'E-mail' };
    const dados = [
      ['Empresa', 'CNPJ', 'Telefone', 'E-mail', 'Via de Contato', 'Contrato', 'Vidas'],
      ...pendentes.map(f => [f.razaoSocial, f.cnpj, f.tel, f.email, VIA[f.via] || f.via, f.contrato, f.vidas])
    ];
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(dados);
    ws['!cols'] = [{wch:45},{wch:20},{wch:16},{wch:32},{wch:14},{wch:12},{wch:8}];
    XLSX.utils.book_append_sheet(wb, ws, 'Pendentes');
    const hoje = new Date().toLocaleDateString('pt-BR').replace(/\//g, '-');
    XLSX.writeFile(wb, 'Pendentes_' + c.nome + '_' + hoje + '.xlsx');
    mostrarToast('✓ Planilha baixada!');
  }

  // ── Inicialização ─────────────────────────────────────────────────────────
  async function init() {
    const token = getToken();
    const loginBox = document.getElementById('login-corpo');

    if (!token) {
      loginBox.innerHTML = '<div class="login-token-erro">Link inválido. Solicite um novo link ao gestor.</div>';
      return;
    }

    // Carregar dados e overrides
    document.getElementById('login-box').innerHTML = '<div class="login-logo">wehandle</div><div class="login-sub">Carregando...</div>';

    try {
      // Carregar dados
      const rD = await fetch(DADOS_URL + Date.now());
      if (rD.ok) {
        const txt = await rD.text();
        _versaoDados = (txt.match(/versao:\s*['"]([^'"]+)['"]/)||[])[1] || '';
        const s = document.createElement('script'); s.textContent = txt; document.head.appendChild(s); document.head.removeChild(s);
        _dados = window.WEHANDLE_DADOS;
      }

      // Carregar overrides
      const rO = await fetch(OVERRIDES_URL + Date.now());
      if (rO.ok) {
        const txt = await rO.text();
        _snapOverrides = txt;
        const s = document.createElement('script'); s.textContent = txt; document.head.appendChild(s); document.head.removeChild(s);
        const ov = window.WEHANDLE_OVERRIDES || {};
        _equipe = ov.equipe || { membros: [], responsaveis: {} };
        _ovContacts = ov.contacts || {};
      }
    } catch(e) {}

    if (!_equipe) {
      document.getElementById('login-box').innerHTML =
        '<div class="login-logo">wehandle</div>' +
        '<div style="color:#c53030;font-size:13px;margin-top:10px">Erro ao carregar dados.</div>' +
        '<button class="btn-entrar" onclick="init()" style="margin-top:16px">Tentar novamente</button>';
      return;
    }

    const membro = (_equipe.membros || []).find(m => m.token === token);
    if (!membro) {
      document.getElementById('login-box').innerHTML =
        '<div class="login-logo">wehandle</div>' +
        '<div style="color:#c53030;font-size:13px;margin-top:10px;text-align:center">Token inválido ou expirado.<br>Solicite um novo link ao gestor.</div>' +
        '<button class="btn-entrar" onclick="init()" style="margin-top:16px;background:#4a5568">Tentar novamente</button>';
      return;
    }

    window._membroParaLogin = membro;

    // Verificar sessão ativa
    if (sessionStorage.getItem(_mSessKey(token)) === '1') {
      _entrarNoAppMembro(membro);
      return;
    }

    // Mostrar tela de credenciais
    document.getElementById('login-wrap').style.display = 'flex';
    _mostrarTelaAuth(membro, token);
  }

  function iniciarPolls() {
    // Auto-refresh dados a cada 5s
    setInterval(async () => {
      const changed = await carregarDados();
      if (changed) {
        document.getElementById('badge-atualizado').textContent = 'Atualizado ' + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
        renderApp();
      }
    }, 5000);

    // Auto-refresh overrides a cada 60s
    setInterval(async () => {
      const changed = await carregarOverrides();
      if (changed) {
        renderApp();
      }
    }, 60000);
  }

  init();
</script>
