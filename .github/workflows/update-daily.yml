name: Atualização diária do painel

on:
  schedule:
    - cron: '45 10 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Rodar script de atualização
        env:
          MB_USER: ${{ secrets.MB_USER }}
          MB_PASS: ${{ secrets.MB_PASS }}
        run: python scripts/update_dados.py

      - name: Commit e push das atualizações
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add dados.js
          git diff --staged --quiet || git commit -m "📊 Atualização diária — $(date +'%d/%m/%Y')"
          git push
